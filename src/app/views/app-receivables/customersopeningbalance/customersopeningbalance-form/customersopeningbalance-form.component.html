<br>
<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">

        <form [formGroup]="custOpeningBalanceAddForm" (ngSubmit)="OnSaveForms()">
            <input type="text" formControlName="id" class="form-control " hidden>
            <input type="text" formControlName="companyId" class="form-control " hidden>
            <input type="text" formControlName="isCanceled" class="form-control " hidden>
            <input type="text" formControlName="isPosted" class="form-control " hidden>
            <input type="text" formControlName="status" class="form-control " hidden>
            <input type="text" formControlName="amount" class="form-control " hidden>
            <input type="text" formControlName="voucherTypeEnum" class="form-control " hidden>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"VoucherType"|translate}}
                        <span class="required-asterisk">*</span>
                    </label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="voucherTypeList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="value" optionValue="label" [filter]="true" formControlName="voucherTypeId"
                        filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                        (onChange)="getVoucherNo($event)" [(ngModel)]="selectedVoucherType"
                        [ngClass]="{ 'invalid-field': custOpeningBalanceAddForm.get('voucherTypeId').value <= 0}" [disabled]="disableAll || disableVouchertype">
                    </p-dropdown>
                </div>
                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"VoucherNo"|translate}}
                        <span class="required-asterisk">*</span>
                    </label>
                    <input type="text" formControlName="voucherNo" class="input border w-full mt-1 "
                        [ngClass]="{ 'invalid-field': isEmpty(custOpeningBalanceAddForm.get('voucherNo').value)}"
                        (blur)="voucherNoBlur(custOpeningBalanceAddForm.value.voucherNo, custOpeningBalanceAddForm.value.voucherTypeId)"
                        [attr.disabled]="allowEditVoucherSerial||disableAll ? 'disabled' : null">
                    <!-- (blur)="IsValidAccNo($event)"> -->
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"VoucherDate"|translate}}
                        <span class="required-asterisk">*</span>
                    </label>
                    <input type="date" formControlName="voucherDate" (blur)="isValidVoucherDate($event)" class="input border w-full mt-1 "
                        [ngClass]="{ 'invalid-field': !validDate}" [attr.disabled]="allowEditDate||disableAll ? 'disabled' : null">
                    <span *ngIf="!validDate" class="required-asterisk">{{"msgInvalidDate"|translate}}</span>
                </div>
            </div>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"Branch"|translate}}
                    </label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="branchesList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="branchId" filterBy="text"
                        appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="allowEditBranch||disableAll">
                    </p-dropdown>
                </div>
                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"Currency"|translate}} <span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="currencyList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="currencyId" filterBy="text"
                        appendTo="body" autoWidth="false" [virtualScroll]="false" (onChange)="getCurrencyRate($event)" [disabled]="disableAll">
                    </p-dropdown>
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"ConverionFactor"|translate}}<span class="required-asterisk">*</span></label>
                    <input type="number" formControlName="currRate" class="input border w-full mt-1 "
                    [attr.disabled]="disableAll ? 'disabled' : null" [readOnly]="disableCurrRate">
                </div>
            </div>

            <div class="card" class="card-blue">
                

                <div class="intro-y tab-content">
                    <div class="tab-content__pane active" id="f01">
                        <div class="intro-y box px-5 pt-5">
                            <p-table #dt [value]="accVouchersDTsList" dataKey="id" [loading]="loading"
                                styleClass="p-datatable-gridlines" [rowHover]="true">
                                <ng-template pTemplate="caption">
                                    <div class="grid grid-cols-12 gap-5 ">
                                        <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mb-5">
                                            <p-button label='{{"AddLine"|translate}}' 
                                                styleClass="p-ripple p-element button w-32 mr-2 mb-5  items-center justify-center bg-theme-1 text-white p-button p-component"
                                                icon="pi pi-plus" (click)="AddNewLine()" [disabled]="disableAll"></p-button>
                                        </div>
                                    </div>
                                </ng-template>
                                <ng-template pTemplate="header">
                                    <tr>
                                        <th style="width: 20%" pSortableColumn="customerId">{{"Customer"|translate}}<p-sortIcon field="customerId"></p-sortIcon></th>
                                        <th style="width: 10%" pSortableColumn="debit">{{"Debit"|translate}} <p-sortIcon field="debit"></p-sortIcon></th>
                                        <th style="width: 10%" pSortableColumn="credit">{{"Credit"|translate}} <p-sortIcon field="credit"></p-sortIcon></th>
                                        <th style="width: 20%" pSortableColumn="note">{{"Notes"|translate}}<p-sortIcon field="note"></p-sortIcon></th>                                    
                                        <th style="width: 5%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="body" class=".p-datatable-tbody " let-accountList let-i="rowIndex">
                                    <tr>
                                        <td><p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                            [options]="accountsList" [style]="{'minWidth':'100%', 'width': '100%'}"
                                            styleClass="input border w-full mt-1" optionLabel="text"
                                            optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                                            autoWidth="false" 
                                            [virtualScroll]="true" [lazy]="true" (onLazyLoad)="loadLazyCustomerOptions($event)"  [virtualScrollItemSize]="40"
                                            [(ngModel)]="accountList.customerId" [ngClass]="{ 'invalid-field': accountList.customerId <= 0}"
                                            [ngModelOptions]="{standalone: true}" [disabled]="disableAll" (keydown)="handleF3Key($event, accountList,i)">
                                        </p-dropdown></td> 
                                        
                                   
                                        <td><input type="number" [(ngModel)]="accountList.debit" (ngModelChange)="onDebitChange(accountList)" (blur)="formatAmt(accountList,0)"
                                                class="input border w-full mt-1 " [ngClass]="{ 'invalid-field': isOneEmpty(accountList) }"
                                                [ngModelOptions]="{standalone: true}" [disabled]="disableAll" (keydown)="handleF3Key($event, accountList,i)">
                                        </td>
                                        <td><input type="number" [(ngModel)]="accountList.credit" [ngClass]="{ 'invalid-field': isOneEmpty(accountList) }" (blur)="formatAmt(accountList,1)"
                                                class="input border w-full mt-1 " (ngModelChange)="onCreditChange(accountList)"
                                                [ngModelOptions]="{standalone: true}" [disabled]="disableAll" (keydown)="handleF3Key($event, accountList,i)">
                                        </td>
                                        <td><input type="text" [(ngModel)]="accountList.note" 
                                                class="input border w-full mt-1 " 
                                                [ngModelOptions]="{standalone: true}" [disabled]="disableAll" (keydown)="handleF3Key($event, accountList,i)">
                                        </td>
                                        <td>
                                            <button mat-icon-button [matMenuTriggerFor]="userMenu" class=""
                                                 type="button">
                                                <mat-icon class="">more_vert</mat-icon>
                                            </button>
                                            <mat-menu #userMenu="matMenu">
                                                <button mat-menu-item (click)="onAddRowBefore(i)" [disabled]="disableAll"><i class="material-icons" style="color:green">add</i>&nbsp;{{"AddRowBefore"|translate}}</button>
                                                <button mat-menu-item (click)="OpenCustomerStatementForm(accountList.customerId)"(click)="OpenAccountFormPopUp(accountList.id,false)" [disabled]="disableAll"><i class="material-icons" style="color:blue">add</i>&nbsp;{{"CustomerRpt"|translate}}</button>
                                                <button mat-menu-item (click)="deleteRow(i)" [disabled]="disableAll"> <i class="material-icons" style="color:red">delete</i>&nbsp;{{"Delete"|translate}} </button>
                                                <button mat-menu-item (click)="CopyRow(accountList,i)"> <i class="material-icons" style="color:rgba(0, 255, 76, 0.747)">file_copy</i> &nbsp;{{"CopyRow"|translate}} </button>
                                            </mat-menu>
                                        </td>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="emptymessage">
                                    <tr class="odd">
                                        <td valign="top" colspan="9"> {{"noEntriesFoundLabel"|translate}}</td>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="footer" >
                                    <tr>
                                        <td>{{"total"|translate}}</td>
                                        <td>{{calculateSum(1) }}</td>
                                        <td>{{calculateSum(2) }}</td>
                                        <td colspan="4"></td>
                                    </tr>
                                    <tr>
                                        <td style="color: black;">{{"Difference"|translate}}</td>
                                        <td style="color: black;">{{calculateSum(0)}}</td>
                                        <td></td>
                                        <td colspan="4"></td>
                                    </tr>
                                </ng-template>
                            </p-table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="custOpeningBalanceAddForm.invalid || !this.validDate || disableSave" type="submit" [hidden]="this.opType == 'Show'"></p-button>
                <p-button label='{{"Print"|translate}}' icon="pi pi-print" class="ml-4"
                (click)="PrintOpeningBalance(this.custOpeningBalanceAddForm.value.id,this.custOpeningBalanceAddForm.value.voucherDate,this.custOpeningBalanceAddForm.value.voucherTypeId,this.custOpeningBalanceAddForm.value.voucherNo )"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="custOpeningBalanceAddForm.invalid" type="button" [hidden]="this.opType == 'Show'"></p-button>
                <p-button label='{{"Delete"|translate}}' color="warn" icon="pi pi-trash" class="ml-4"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="custOpeningBalanceAddForm.invalid" type="button" [hidden]="this.opType == 'Show'"
                    (click)=" DeleteOpeningBalance(this.custOpeningBalanceAddForm.value.id)">
                    
                </p-button>
                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-6 text-white p-button p-component"
                    [routerLink]="['/CustomersOpeningBalance/CustOpeningBalanceList']"></p-button>
            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
