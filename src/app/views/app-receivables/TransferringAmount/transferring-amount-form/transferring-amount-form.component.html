<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">
        <br>

        <form [formGroup]="TransferringAmountForm" (ngSubmit)="onSubmit()">
            <input type="text" formControlName="id" class="form-control " hidden>
            <input type="text" formControlName="companyId" class="form-control " hidden>

            <div class="grid grid-cols-12 gap-5 mt-5">

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <div>
                        <label class="control-label font-weight-bold">{{"VoucherNo"|translate}}<span
                                class="required-asterisk">*</span> </label>
                        <input type="input" class="input border w-full mt-1" formControlName="voucherNo" readonly
                        [attr.disabled]="disableAll ? 'disabled' : null">
                    </div>
                </div>

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <div>
                        <label class="control-label font-weight-bold">{{"VoucherDate"|translate}}<span
                                class="required-asterisk">*</span> </label>
                        <input type="date" class="input border w-full mt-1" formControlName="voucherDate"  [attr.disabled]="disableAll ? 'disabled' : null">
                    </div>
                </div>

                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                    <label class=" font-weight-bold">{{"FromTheStudent"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [ngClass]="{ 'invalid-field': TransferringAmountForm.get('fromTheStudent').value <= 0}"
                        autoWidth="false" [options]="StudentList" formControlName="fromTheStudent"  [disabled]="disableAll"
                        [virtualScroll]="true" [lazy]="true" (onLazyLoad)="AuthloadLazyOptions($event)" [virtualScrollItemSize]="40">
                    </p-dropdown>
                </div>

                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                    <label class=" font-weight-bold">{{"ToTheStudent"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [ngClass]="{ 'invalid-field': TransferringAmountForm.get('toTheStudent').value <= 0}"
                        autoWidth="false" [options]="StudentList" formControlName="toTheStudent" [disabled]="disableAll"
                        [virtualScroll]="true" [lazy]="true" (onLazyLoad)="AuthloadLazyOptions($event)" [virtualScrollItemSize]="40">
                    </p-dropdown>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-5 mt-5">

                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <div>
                        <label class=" font-weight-bold">{{"TheAmount"|translate}}<span
                                class="required-asterisk">*</span></label>
                        <input type="input" class="input border w-full mt-1" formControlName="amount" [attr.disabled]="disableAll ? 'disabled' : null"
                        [ngClass]="{ 'invalid-field': TransferringAmountForm.get('amount').value <= 0}">
                    </div>
                </div>


                <div class="col-span-12 sm:col-span-9 xxl:col-span-9 cursor-pointer mt-1">
                    <div>
                        <label class=" font-weight-bold">{{"notes"|translate}}</label>
                        <input type="input" class="input border w-full mt-1" formControlName="note" [attr.disabled]="disableAll ? 'disabled' : null">
                    </div>
                </div>


                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
                    <div class="intro-y tab-content">
                        <div class="intro-y box px-5 pt-5 mt-5">
                            <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">
                                <a width="200px" data-toggle="tab" data-target="#f01" href="javascript:;"
                                    class="py-4 sm:mr-8 active">{{"BondTerms"|translate}}</a>
                            </div>
                        </div>

                        <div class="intro-y box tab-content">
                            <div class="tab-content__pane active" id="f01">
                                <div class="intro-y box px-5 pt-5">
                                    <app-app-general-attachment [voucherId]="voucherId"></app-app-general-attachment>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">

                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                    [disabled]="TransferringAmountForm.invalid || disableSave" [hidden]="this.opType == 'Show'"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="submit">
                </p-button>

                <p-button label='{{"Print"|translate}}' icon="pi pi-print" class="ml-4" [hidden]="showsave"
                    [disabled]="TransferringAmountForm.invalid" (click)="PrintTransferringAmount(this.TransferringAmountForm.value.id)"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="button">
                </p-button>

                <p-button label='{{"Delete"|translate}}' color="warn" icon="pi pi-trash" class="ml-4" [hidden]="this.opType == 'Show'"
                     [disabled]="TransferringAmountForm.invalid" (click)="DeleteTransferringAmount(this.TransferringAmountForm.value.id)" 
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="button">
                </p-button>

                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-6 text-white p-button p-component"
                    [routerLink]="['/TransferringAmount/TransferringAmountList']">
                </p-button>

            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
