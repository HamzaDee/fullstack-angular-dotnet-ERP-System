<div class="container intro-y box px-5 pb-5 mb-5">

    <div class="grid grid-cols-12 gap-5 pt-5">
        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">

            <p-table #dt [value]="data" [rows]="10" [paginator]="true"
                [globalFilterFields]="['id','reportNameAr','reportNameEn']"
                styleClass="p-datatable-gridlines" responsiveLayout="scroll" [rowHover]="true" dataKey="id"
                currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
                [showCurrentPageReport]="true">
                <ng-template pTemplate="caption">
                    
                    <div class="grid grid-cols-12 gap-5 ">

                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1 mb-5">
                            <span class="p-input-icon-left">
                                <i class="pi pi-search"></i>
                                <input class="pInputText input border w-full mt-1" pInputText type="text"
                                    (input)="dt.filterGlobal($event.target.value, 'contains')"
                                    placeholder=' {{"search"|translate}} ' />
                            </span>
                        </div>
        
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-4 ">
                            <p-button label='{{"AddNew"|translate}}'
                                styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                                icon="pi pi-plus" (click)="OpenStoresFormPopUp(0,0,true)"></p-button>
                        </div> 
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-4 ">
                            <p-button label='{{"ResetReportBtn"|translate}}'
                                styleClass="p-ripple p-element button w-64 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                                icon="pi pi-plus" (click)="ResetReports('')"></p-button>
                        </div> 
        
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-5" align="end">

                            <button title="{{'ExportToExcel' | translate}}" class="mr-2" type="button" pbutton=""
                            pripple="" icon="pi pi-file-excel" ptooltip="XLS" (click)="exportExcel()"
                            tooltipposition="bottom" class="button px-2 mr-1 mb-2 text-gray-700">
                            <img src="../../../../assets/dist/images/icons/excel.svg" width="20px">
                            </button>
                            
                            <button title="{{'ExportToPdf' | translate}}" class="mr-2" type="button" pbutton=""
                                    pripple="" icon="pi pi-file-excel" ptooltip="PDF" (click)="exportPdf()"
                                    tooltipposition="bottom" class="button px-2 mr-1 mb-2 text-gray-700">
                                    <img src="../../../../assets/dist/images/icons/pdf.svg" width="20px">
                            </button>
                        </div>
                    </div>


                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th class="head_tb" pSortableColumn="id">{{"number"|translate}}<p-sortIcon field="id"></p-sortIcon>
                        </th>
                        <th class="head_tb" pSortableColumn="reportNameAr">{{"ArabicName"|translate}}<p-sortIcon field="reportNameAr"></p-sortIcon>
                        </th>
                        <th class="head_tb" pSortableColumn="reportNameEn">{{"EnglishName"|translate}}<p-sortIcon field="reportNameEn"></p-sortIcon>
                        </th>
                        <th class="text-center-m"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                        <th class="text-center-m"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" class=".p-datatable-tbody " let-report>
                    <tr>
                        <td style="text-align: justify;">{{report.id}}</td>
                        <td style="text-align: justify;">{{report.reportNameAr}} </td>
                        <td style="text-align: justify;">{{report.reportNameEn}}</td>
                        <td style="width:5%">
                            <a class="btn btn-primary btn-xs" [attr.title]="'Edit' | translate" [routerLink]="['/ReportsList/ReportDesigner']" [queryParams]="{reportName: report.reportName}" routerLinkActive="active">
                                <i class="material-icons" style="color:blue">edit</i> 
                            </a>
                        </td>
                        <td style="width:5%">
                            <a class="btn btn-primary btn-xs" [attr.title]="'ResetReportBtn' | translate" (click)="ResetReports(report.reportName)">
                                <i class="material-icons" style="color:blue">restart_alt</i> 
                            </a>
                        </td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="emptymessage">
                    <tr class="odd">
                        <td valign="top" colspan="7"> {{"noEntriesFoundLabel"|translate}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>


</div>
<div class="loading-indicator" [hidden]="!showLoader">
</div>
