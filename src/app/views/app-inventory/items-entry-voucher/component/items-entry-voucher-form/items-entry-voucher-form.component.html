<br>
<div class="intro-y box px-5 pb-5 mb-5">
    <form [formGroup]="itemsEntryVoucherForm" (ngSubmit)="OnSaveForm()">
        <!-- <input type="text" formControlName="voucherTypeEnum" class="form-control " hidden>
        <input type="text" formControlName="id" class="form-control " hidden>
            <input type="text" formControlName="companyId" class="form-control " hidden>
            <input type="text" formControlName="isCanceled" class="form-control " hidden>
            <input type="text" formControlName="isPosted" class="form-control " hidden>
            <input type="text" formControlName="status" class="form-control " hidden>
            <input type="text" formControlName="amount" class="form-control " hidden> -->
        <div class="grid grid-cols-12 gap-5 pt-5">
            <div *ngIf="isEntryVoucherFormloaded" class="col-span-12 sm:col-span-12 xxl:col-span-12 mt-1">
                <div class="border-grey">
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
                            <label class="control-label font-weight-bold">{{"voucherType"|translate}}
                                <span class="required-asterisk">*</span>
                            </label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                [options]="voucherTypeList" [style]="{'minWidth':'100%', 'width': '100%'}"
                                styleClass="input border w-full mt-1" optionLabel="label" optionValue="value"
                                [filter]="true" [formControl]="itemsEntryVoucherForm.get('voucherTypeId')"
                                filterBy="label" appendTo="body" autoWidth="false" [virtualScroll]="false"
                                (onChange)="getVoucherNo($event)"
                                [ngClass]="{'invalid-field': 
                                    itemsEntryVoucherForm.get('voucherTypeId').value<=0 && itemsEntryVoucherForm.get('voucherTypeId').touched}">
                            </p-dropdown>
                            <span class="required-asterisk mt-1"
                                *ngIf="itemsEntryVoucherForm.get('voucherTypeId').value<=0 && itemsEntryVoucherForm.get('voucherTypeId').touched">
                                {{"required"|translate}}
                            </span>
                        </div> 
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 mt-1">
                            <label class="control-label font-weight-bold">{{"voucherNo"|translate}}
                                <span class="required-asterisk">*</span>
                            </label>
                            <input type="text" [formControl]="itemsEntryVoucherForm.get('voucherNo')"
                                class="input border w-full mt-1 " [attr.disabled]="allowEditVoucherSerial ? 'disabled' : null">
                        </div>
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 mt-1">
                            <label class="control-label font-weight-bold">{{"voucherDate"|translate}}
                                <span class="required-asterisk">*</span>
                            </label>
                            <input type="date" [formControl]="itemsEntryVoucherForm.get('voucherDate')"
                                class="input border w-full mt-1 " [attr.disabled]="isTabDisabled ? 'disabled' : null">
                        </div>
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 mt-1">
                            <input id="isOpeningBalance" type="checkbox" 
                                [formControl]="itemsEntryVoucherForm.get('isOpeningBalance')" 
                                class="input border mr-2 mr-3 ml-3" [attr.disabled]="isTabDisabled ? 'disabled' : null" />
                            <label class="cursor-pointer select-none"
                                for="isOpeningBalance">{{"isOpeningBalance"|translate}}</label>
                        </div>
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 mt-1">
                            <input id="reserved" type="checkbox" [formControl]="itemsEntryVoucherForm.get('reserved')" 
                                class="input border mr-2 mr-3 ml-3" [attr.disabled]="isTabDisabled ? 'disabled' : null"/>
                            <label class="cursor-pointer select-none" for="reserved">{{"reserved"|translate}}</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
                            <label class="control-label font-weight-bold">{{"branch"|translate}}
                            </label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="branchsList"
                                [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                optionLabel="text" optionValue="id" [filter]="true"
                                [formControl]="itemsEntryVoucherForm.get('branchId')" filterBy="text" appendTo="body"
                                autoWidth="false" [virtualScroll]="false" [disabled]="allowEditBranch">
                            </p-dropdown>
                        </div>
                        <div *ngIf="!itemEntryVoucerSettings.useStoreInGrid"
                            class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
                            <label class="control-label font-weight-bold">{{"store"|translate}}
                                <span class="required-asterisk">*</span>
                            </label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="storesList"
                                [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                                autoWidth="false" [virtualScroll]="false"
                                [formControl]="itemsEntryVoucherForm.get('storeId')"
                                [ngClass]="{'invalid-field': 
                                itemsEntryVoucherForm.get('storeId').value<=0 && itemsEntryVoucherForm.get('storeId').touched}">
                            </p-dropdown>
                            <span class="required-asterisk mt-1"
                                *ngIf="itemsEntryVoucherForm.get('branchId').value<=0 && itemsEntryVoucherForm.get('branchId').touched">
                                {{"required"|translate}}
                            </span>
                        </div>
                        
                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 mt-1">
                            <label class="control-label font-weight-bold">{{"note"|translate}}
                            </label>
                            <input type="text" [formControl]="itemsEntryVoucherForm.get('note')"
                                class="input border w-full mt-1 ">
                        </div>
                    </div>
                </div>
                <div class="card card-blue border-grey">
                    <div class="intro-y box px-5 pt-5 mt-5">
                        <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">
                            <a id="tabVoucherTerms" data-toggle="tab" data-target="#f01" href="javascript:;"
                                class="py-4 sm:mr-8 active">{{"vouvherTerms"|translate}}</a>
                            <a id="tabVoucherAttachments" data-toggle="tab" data-target="#f02" href="javascript:;"
                                class="py-4 sm:mr-8">{{"voucherAttatchment"|translate}}</a>
                        </div>
                    </div>
                    <div class="intro-y tab-content">
                        <div class="tab-content__pane active" id="f01" [ngClass]="{ 'disabled-tab': isTabDisabled }">
                            <div class="intro-y box px-5 pt-5">
                                <app-voucher-terms #voucherTerms [itemEntryVoucerSettings]="itemEntryVoucerSettings"
                                    [termsVouchersFormData]="itemsEntryVoucherForm.get('invVouchersDt')">
                                </app-voucher-terms>
                            </div>
                        </div>
                        <div class="tab-content__pane" id="f02" [ngClass]="{ 'disabled-tab': isTabDisabled }">
                            <div class="intro-y box px-5 pt-5">
                                <app-voucher-attachments #voucherAttachments
                                    [vouchersAttachmentsFormData]="itemsEntryVoucherForm.get('invVouchersDoc')">

                                </app-voucher-attachments>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="intro-y tab-content">
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 mt-1" align="end">
                    <p-button [hidden]="isViewMode" [disabled]="itemsEntryVoucherForm.invalid"
                        label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                        type="submit">
                    </p-button>
                    <p-button [hidden]="isViewMode" label='{{"Print"|translate}}'
                        (click)="openItemsEntryVoucherTemplate()" icon="pi pi-print" class="ml-4"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-9 text-white p-button p-component"
                        type="button">
                    </p-button>
                    <p-button *ngIf="requstId && requstId!=0" label='{{"Delete"|translate}}' [hidden]="isViewMode"
                        (click)="deleteItemEntryVoucher()" class="ml-4"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"
                        type="button" icon="pi pi-delete">
                    </p-button>
                    <p-button label='{{"Cancel"|translate}}' (click)="onCancel()"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-7 text-white p-button p-component"
                        type="button" icon="pi pi-undo">
                    </p-button>
                </div>
            </div>
        </div>
    </form>
</div>
