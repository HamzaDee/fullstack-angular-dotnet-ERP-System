<div class="content">
    <div class="card">
        <div class="card-header text-center mt-5">
            <h1>{{data.title}}</h1>
        </div>
        <div class="intro-y box px-5 py-5  mt-2">
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-4 sm:col-span-4 xxl:col-span-4">
                    <label class="control-label font-weight-bold">{{"itemName"|translate}}
                    </label>
                    <input disabled type="text" [value]="getItemName()" class="input border w-full mt-1 ">
                </div>
                <div class="col-span-4 sm:col-span-4 xxl:col-span-4">
                    <label class="control-label font-weight-bold">{{"Quantity"|translate}}
                    </label>
                    <input disabled type="text" [value]="data.quantity" class="input border w-full mt-1 ">
                </div>

            </div>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-4 sm:col-span-4 xxl:col-span-4">
                    <p-button
                        styleClass="p-ripple p-element button mr-2 mb-2 flex items-center justify-center bg-theme-4 text-white p-button p-component"
                        type="button"
                        (click)="generateSerialNumbers()">{{"enterAutoSequenceLikeFristSequence"|translate}}
                    </p-button>
                </div>
                <div class="col-span-4 sm:col-span-2 xxl:col-span-2">
                    <p-button
                        styleClass="p-ripple p-element button mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"
                        type="button" color="warn" (click)="clearAllSerialNumbers()">{{"Delete"|translate}}
                    </p-button>
                </div>
            </div>
            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 mt-3">
                <p-table [paginator]="true" [rows]="4" [value]="itemSerialsForms.controls"
                    styleClass="p-datatable-gridlines" dataKey="id">
                    <ng-template pTemplate="header">
                        <tr>
                            <th>{{"number"|translate}}
                            <th>{{"SerialNo"|translate}}
                            <th>
                                <i class="pi pi-cog" style="font-size: 1.2rem"></i>
                            </th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" class=".p-datatable-tbody " let-itemSerialForm>
                        <tr>
                            <td>
                                <input type="text" readonly [formControl]="itemSerialForm.get('number')"
                                    class="input border w-full mt-1 ">
                            </td>
                            <td>
                                <input type="text" [formControl]="itemSerialForm.get('serialNo')"
                                    class="input border w-full mt-1 ">
                            </td>
                            <td>
                                <i class="material-icons cursor-pointer"
                                    (click)="clearSerialNumberByNumber(itemSerialForm.value.number)"
                                    [ngStyle]="{'color': isViewMode ? '#898989' : 'red'}">delete</i>
                            </td>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="emptymessage">
                        <tr class="odd">
                            <td valign="top" colspan="3"> {{"noEntriesFoundLabel"|translate}}</td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>

        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
            <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                (click)="onSave()" type="button"></p-button>
            <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"
                (click)="dialogRef.close(false)"></p-button>
        </div>
    </div>
</div>
