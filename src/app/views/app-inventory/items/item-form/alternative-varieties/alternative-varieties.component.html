<p-table #dt  [value]="alternativeItemFormArray.controls" styleClass="p-datatable-gridlines" dataKey="id">
    <ng-template pTemplate="caption">
        <div class="row mb-8">
            <div class="col-md-6">
                <i class="material-icons cursor-pointer" style="color:green" (click)="addNewRow()">add_box</i>
            </div>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>{{"Group"|translate}}
            <th>{{"storageLocation"|translate}}
            <th><i class="pi pi-cog" style="font-size: 1.2rem"></i>
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" class=".p-datatable-tbody " let-alternativeItemForm>
        <tr [formGroup]="alternativeItemForm">
            <td style="width:35%">
                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="itemsList"
                    [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id" [filter]="true"
                    filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                    [formControl]="alternativeItemForm.get('subItemId')" [ngClass]="{'invalid-field': 
                    alternativeItemForm.get('subItemId').value<=0 && alternativeItemForm.get('subItemId').touched}">>
                </p-dropdown>
            </td>
            <td style="width:60%">
                <input type="text" formControlName="note" class="input border w-full mt-1">
            </td>
            <td style="width:5%">
                <i class="material-icons cursor-pointer" style="color:green"(click)="addNewRow()">add_box</i>
                <i class="material-icons cursor-pointer"  (click)="deleteRow(getUnitFormGroupIndex(alternativeItemForm))"
                    style="color:red">delete</i>
            </td>
        </tr>
    </ng-template>
</p-table>
