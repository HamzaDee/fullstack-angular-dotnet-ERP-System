<p-table #dt [value]="itemsDealersFormArray.controls" styleClass="p-datatable-gridlines" dataKey="id">
    <ng-template pTemplate="caption">
        <div class="row mb-8">
            <div class="col-md-6">
                <i class="material-icons cursor-pointer" [ngStyle]="{'color': isViewMode ? '#898989' : 'green'}"
                    style="color:green" (click)="addNewRow()">add_box</i>
            </div>
        </div>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>{{"Supplier"|translate}}
            <th>{{"unit"|translate}}
            <th>{{"Price"|translate}}
            <th>{{"countryOrigin"|translate}}
            <th>{{"DeliveryTime"|translate}}
            <th>{{"MinimumQtyOrder"|translate}}
            <th>{{"PackageSize"|translate}}
            <th><i class="pi pi-cog" style="font-size: 1.2rem"></i>
            </th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" class="p-datatable-tbody" let-itemsdealersFormGroup let-i="rowIndex">
        <tr [formGroup]="itemsdealersFormGroup">
            <td style="width:15%">
                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="dealersList"
                    [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id" [filter]="true"
                    filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                    [formControl]="itemsdealersFormGroup.get('dealerId')" [ngClass]="{'invalid-field': 
                    itemsdealersFormGroup.get('dealerId').value<=0 }">
                </p-dropdown>
            </td>
            <!-- && itemsdealersFormGroup.get('dealerId').touched -->
            <td style="width:15%">                
                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="unitsList"
                    [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id" [filter]="true"
                    filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                    [formControl]="itemsdealersFormGroup.get('unitId')" [ngClass]="{'invalid-field': 
                    itemsdealersFormGroup.get('unitId').value<=0 }">
                </p-dropdown>
            </td>
            <!-- && itemsdealersFormGroup.get('unitId').touched -->
            <td style="width:10%">
                <input type="number"
                    [ngClass]="{ 'invalid-field': itemsdealersFormGroup.get('price').touched && itemsdealersFormGroup.get('price').invalid }"
                    formControlName="price" class="input border w-full mt-1 ">
            </td>
            <td style="width:15%">                
                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="originCountryList"
                    [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id" [filter]="true"
                    filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                    [formControl]="itemsdealersFormGroup.get('originCountry')">
                </p-dropdown>
            </td>
            <td style="width:10%">
                <input type="number"
                    [ngClass]="{ 'invalid-field': itemsdealersFormGroup.get('deliveryTime').touched && itemsdealersFormGroup.get('deliveryTime').hasError('required') }"
                    formControlName="deliveryTime" class="input border w-full mt-1">
            </td>
            <td style="width:10%">
                <input type="number"
                    [ngClass]="{ 'invalid-field': itemsdealersFormGroup.get('minOrderQty').touched && itemsdealersFormGroup.get('minOrderQty').hasError('required') }"
                    formControlName="minOrderQty" class="input border w-full mt-1">
            </td>
            <td style="width:10%">
                <input type="number"
                    [ngClass]="{ 'invalid-field': itemsdealersFormGroup.get('packageSize').touched && itemsdealersFormGroup.get('packageSize').hasError('required') }"
                    formControlName="packageSize" class="input border w-full mt-1">
            </td>
 
            <td style="width:5%">
                <!-- <i class="material-icons cursor-pointer" [ngStyle]="{'color': isViewMode ? '#898989' : 'green'}"
                    (click)="addNewRow()">add_box</i> -->
                <i class="material-icons cursor-pointer" (click)="deleteRow(i)"
                    [ngStyle]="{'color': isViewMode ? '#898989' : 'red'}">delete</i>
            </td>
        </tr>
    </ng-template>
</p-table>
