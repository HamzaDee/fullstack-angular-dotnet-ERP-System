<div class="content">

    <div class="text-center mt-5 mb-4">
        <h1 class="text-2xl  border-b pb-3">{{data.title}}</h1>
    </div>

    <div class="card">
        <p-table #dt [value]="dataList" [rows]="10" [paginator]="true"
            [globalFilterFields]="['id','storeName','storeKeeperName','telephone','mobile','address','active']"
            styleClass="p-datatable-gridlines" responsiveLayout="scroll" [rowHover]="true" dataKey="id"
            currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
            [showCurrentPageReport]="true">

            <ng-template pTemplate="header">
                <tr>
                    <th class="head_tb" pSortableColumn="id">{{"StoreAdminName"|translate}} </th>
                    <th class="head_tb" pSortableColumn="storeName">{{"FromDate"|translate}}</th>
                    <th class="head_tb" pSortableColumn="storeKeeperName">{{"ToDate"|translate}}</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" class=".p-datatable-tbody " let-store>
                <tr>
                    <td style="text-align: justify;">{{store.storeKeeperName}}</td>
                    <td style="text-align: justify;">{{store.startDate| date: "dd/MM/yyyy"}}</td>
                    <td style="text-align: justify;">{{store.endDate| date: "dd/MM/yyyy"}} </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr class="odd">
                    <td valign="top" colspan="3"> {{"noEntriesFoundLabel"|translate}}</td>
                </tr>
            </ng-template>
        </p-table>

        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-4" mat-dialog-actions align="end">
            <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo" (click)="dialogRef.close(false)"
                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component">
            </p-button>
        </div>
    </div>
</div>
