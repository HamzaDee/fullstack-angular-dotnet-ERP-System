<p-table #dt [value]="notifications" [rows]="5" [paginator]="true" 
          [globalFilterFields]="['title','message','createdAt']" styleClass="p-datatable-gridlines"
           responsiveLayout="scroll" [rowHover]="true" dataKey="id"
           currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
           [showCurrentPageReport]="true">

           <ng-template pTemplate="caption">
           <div class="p-5"> {{"NotificationsList"|translate}} </div> 
            <div class="grid grid-cols-12 gap-5 ">
                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mb-2">
                    <span class="p-input-icon-left"> <i class="pi pi-search"></i>
                        <input class="input w-full border mt-1 txt_r" pInputText type="text"(input)="dt.filterGlobal($event.target.value, 'contains')"
                           placeholder='{{"search"|translate}} ' />
                    </span>
                </div>
            </div>
        </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th style="width:20%">{{"Address"|translate}}</th>
                    <th style="width:65%">{{"MESSAGE"|translate}}</th>
                    <th style="width:15%">{{"Date"|translate}}</th>
                    <!-- <th class="text-center-m" width= "100px"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th> -->
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-row  let-i="index">
                <tr [style.background-color]="row.noteColor"> 
                     <td style="text-align: justify;">{{row.title}}</td>
                     <td style="text-align: justify;">{{row.message}}</td>
                    <td  style="text-align: justify;">{{row.createdAt | date: 'dd-MM-yyyy'}}</td>

                    <!--<td>
                         <div style="display:flex; flex: 0 0 10%">
                        
                            <a class="arrow-m px-1 cursor-pointer"   (click)="navigateToReminderNotesPopUp(row.id, row, false)"
                                title='{{"Edit"|translate}}'><img style="max-width:unset !important"
                                src="../../../../assets/dist/images/icons/action/edit.svg" />
                           </a>

                            &nbsp;

                            <a class="arrow-m px-1" (click)="DeleteReminderNotes(row.id, row)"
                                title='{{"Delete"|translate}}'><img style="max-width:unset !important"
                                src="../../../../assets/dist/images/icons/action/delete.svg" />
                            </a>
                        
                        </div>  
                                               
                    </td>-->
                </tr>
            </ng-template>
        </p-table>
