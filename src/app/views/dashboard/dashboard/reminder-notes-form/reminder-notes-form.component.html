<div class="intro-y box px-5 pb-5 mb-5">
    <br>

    <form [formGroup]="ReminderNotesForm" (ngSubmit)="OnSaveForms()">

        <div class="card-header text-center mt-5">
            <h1>{{data.title}}</h1>
     </div>

        <div class="grid grid-cols-12 gap-5 mt-5">

            <input hidden formControlName="id">
            <input hidden formControlName="noteColor">
            <input hidden formControlName="stampDate">


            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1" (click)="changeColor('white')" formControlName="noteColor">

                <div _ngcontent-iyu-c489="" class="report-box zoom-in">
                    <div _ngcontent-iyu-c489="" class="box p-5" style="background-color: #ffffff; color:#0a0a0a;">
                        <div _ngcontent-iyu-c489="" class="text-base text-gray-600 mt-1">
                            {{"Normal"|translate}}
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1" (click)="changeColor('bisque')" formControlName="noteColor">

                <div _ngcontent-iyu-c489="" class="report-box zoom-in">
                    <div _ngcontent-iyu-c489="" class="box p-5" style="background-color: 	#FFE4C4; color:#0a0a0a;" formControlName="noteColor">
                        <div _ngcontent-iyu-c489="" class="text-base text-gray-600 mt-1">
                            {{"Middel"|translate}}
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1" (click)="changeColor('aquamarine')">

                <div _ngcontent-iyu-c489="" class="report-box zoom-in">
                    <div _ngcontent-iyu-c489="" class="box p-5" style="background-color: #7FFFD4; color:#0a0a0a;" formControlName="noteColor">
                        <div _ngcontent-iyu-c489="" class="text-base text-gray-600 mt-1">
                            {{"Important"|translate}}
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1" (click)="changeColor('lightcoral')">

                <div _ngcontent-iyu-c489="" class="report-box zoom-in">
                    <div _ngcontent-iyu-c489="" class="box p-5" style="background-color: #f08080; color:#0a0a0a;">
                        <div _ngcontent-iyu-c489="" class="text-base text-gray-600 mt-1">
                            {{"VeryImportent"|translate}}
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer">
                <textarea class="input w-full border mt-1" style="height: 100px; width: 900px;" formControlName="descr"
                    [style.background-color]="selectedColor"></textarea>
            </div>

        </div>

        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
            <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" [disabled]="ReminderNotesForm.invalid"
                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                type="submit"></p-button>

            <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo" (click)="dialogRef.close(false)"
                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"></p-button>
        </div>

    </form>
</div>
<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
