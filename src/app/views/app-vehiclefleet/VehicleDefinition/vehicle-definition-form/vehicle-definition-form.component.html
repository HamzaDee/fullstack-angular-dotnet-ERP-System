<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">
        <br>

        <form [formGroup]="VehicleDefinitionForm" (ngSubmit)="OnSaveForms()">
            <div class="grid grid-cols-12 gap-5 mt-5">
                 <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="plateNo" class="control-label font-weight-bold">{{"PlateNumber" | translate}}<span class="required-asterisk">*</span></label>
                    <input type="text" class="input border w-full mt-1" [value]="formattedPlateNo"
                        (input)="onPlateNoInput($event)" [attr.disabled]="disableAll ? true : null"
                        [ngClass]="{ 'invalid-field': isEmpty(VehicleDefinitionForm.get('plateNo')?.value) }"/>
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="carTypeId" class="control-label font-weight-bold">{{"TypeModel"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="TypeModelList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="carTypeId"
                        [ngClass]="{ 'invalid-field': VehicleDefinitionForm.get('carTypeId')?.value <= 0}">
                    </p-dropdown>
                </div>
                 <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="model" class="control-label font-weight-bold">{{"CarModel"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="carModelList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="model"
                        [ngClass]="{ 'invalid-field': VehicleDefinitionForm.get('model')?.value <= 0}">
                    </p-dropdown>
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="manufactureYear" class="control-label font-weight-bold">{{"Yearofmanufacture"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <input type="number" class="input border w-full mt-1" formControlName="manufactureYear"
                        [attr.disabled]="disableAll ? 'disabled' : null"
                        [ngClass]="{ 'invalid-field': VehicleDefinitionForm.get('manufactureYear')?.value <= 0}">
                </div>

                <div class="col-span-12 sm:col-span-1 xxl:col-span-1 cursor-pointer mt-1">
                    <label for="color" class="control-label font-weight-bold">{{"color"|translate}}</label>
                    <input type="text" class="input border w-full mt-1" formControlName="color"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>

                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label  for="engineNo" class="control-label font-weight-bold">{{"EngineType"|translate}}</label>
                    <input type="text" class="input border w-full mt-1" formControlName="engineNo"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
            </div>
             <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="transmissionTypeId" class="control-label font-weight-bold">{{"TransmissionType"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="TransmissionTypeList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="transmissionTypeId"
                        [ngClass]="{ 'invalid-field': VehicleDefinitionForm.get('transmissionTypeId')?.value <= 0}">
                    </p-dropdown>
                </div>

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="fuelTypeId" class="control-label font-weight-bold">{{"FuelType"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="FuelTypeList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="fuelTypeId"
                        [ngClass]="{ 'invalid-field': VehicleDefinitionForm.get('fuelTypeId')?.value <= 0}">
                    </p-dropdown>
                </div>


                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="seatingCapacity" class="control-label font-weight-bold">{{"SeatingCapacity"|translate}}</label>
                    <input type="number" class="input border w-full mt-1" formControlName="seatingCapacity"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="fuelTankCapacity" class="control-label font-weight-bold">{{"FuelTankCapacity"|translate}}</label>
                    <input type="number" class="input border w-full mt-1" formControlName="fuelTankCapacity"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>


               

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="driverName" class="control-label font-weight-bold">{{"CarRecipient"|translate}}</label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="DriverNameList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="driverName">
                    </p-dropdown>
                </div>

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="loadCapacity" class="control-label font-weight-bold">{{"LoadCapacity"|translate}}</label>
                    <input type="number" class="input border w-full mt-1" formControlName="loadCapacity"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
            </div>
             <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="licenseExpDate" class="control-label font-weight-bold">{{"LicenseExpirationDate"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <input type="date" class="input border w-full mt-1 " formControlName="licenseExpDate"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>

                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="chassisNo" class="control-label font-weight-bold">{{"ChassisNo"|translate}}</label>
                    <input id="chassisNo" type="text" class="input border w-full mt-1" formControlName="chassisNo"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="registrationNo" class="control-label font-weight-bold">{{"RegistrationNo"|translate}}</label>
                    <input id="registrationNo" type="text" class="input border w-full mt-1" formControlName="registrationNo"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
                 <div class="col-span-12 sm:col-span-1 xxl:col-span-1 cursor-pointer mt-1">
                    <input id="isPhotoSent1" [checked]="isMilitary == 1" (change)="onisMilitaryChange($event)" type="checkbox"
                        class="input border mr-3 ml-3 mt-5" [attr.disabled]="disableAll ? 'disabled' : null"/>
                    <label class="cursor-pointer select-none" for="isMilitary"> {{"isMilitary" | translate}} </label>
                </div>  
                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1" *ngIf="isMilitary == 1">
                    <label for="militaryPlateNo" class="control-label font-weight-bold">{{"militaryPlateNo"|translate}}</label>
                    <input id="militaryPlateNo" type="text" class="input border w-full mt-1" formControlName="militaryPlateNo"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="driverMobile" class="control-label font-weight-bold">{{"PhoneNumber"|translate}}</label>
                    <input id="driverMobile" type="text" class="input border w-full mt-1" formControlName="driverMobile"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="engineCapacity" class="control-label font-weight-bold">{{"EngineCapacity"|translate}}</label>
                    <input id="engineCapacity" type="text" class="input border w-full mt-1" formControlName="engineCapacity"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
            </div>
             <div class="grid grid-cols-12 gap-5 mt-5">

                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label for="locationId" class="control-label font-weight-bold">{{"CarWorkPlace"|translate}}</label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                        [options]="carLocationList" [disabled]="disableAll ? 'disabled' : null" autoWidth="false"
                        [virtualScroll]="false" formControlName="locationId">
                    </p-dropdown>
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="belongTo" class="control-label font-weight-bold">{{"CarOwner"|translate}}</label>
                    <input id="belongTo" type="text" class="input border w-full mt-1" formControlName="belongTo"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
                 <div class="col-span-12 sm:col-span-1 xxl:col-span-1 cursor-pointer mt-1">
                    <input id="isPhotoSent1" formControlName="tracking"  type="checkbox"
                        class="input border mr-3 ml-3 mt-5" [attr.disabled]="disableAll ? 'disabled' : null"/>
                    <label class="cursor-pointer select-none" for="isTracking"> {{"Tracking" | translate}} </label>
                </div> 
                 <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label for="notes" class="control-label font-weight-bold">{{"Note"|translate}}</label>
                    <input type="text" class="input border w-full mt-1" formControlName="notes"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>
            </div>

            <div class="grid grid-cols-12 gap-5 mt-5">               
                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
                    <div class="intro-y tab-content">

                        <div class="intro-y box px-5 pt-5 mt-5">
                            <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">

                                <a width="200px" data-toggle="tab" data-target="#f01" href="javascript:;"
                                    class="py-4 sm:mr-8 active">{{"VoucherAttachments"|translate}}
                                </a>

                            </div>
                        </div>

                        <div class="intro-y box tab-content">

                            <div class="tab-content__pane active" id="f01">
                                <div class="intro-y box px-5 pt-5">
                                    <app-app-general-attachment [voucherId]="id"></app-app-general-attachment>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>~
            </div>


            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">

                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" type="submit" [hidden]="showsave"
                    [disabled]="VehicleDefinitionForm.invalid"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component">
                </p-button>

                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    [routerLink]="['/VehicleDefinition/VehicleDefinition']"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-6 text-white p-button p-component">
                </p-button>
            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
