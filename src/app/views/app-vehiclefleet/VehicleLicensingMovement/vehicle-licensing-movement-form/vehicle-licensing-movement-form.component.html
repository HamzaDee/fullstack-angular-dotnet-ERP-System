<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">
        <br>

        <form [formGroup]="VehicleLicensingMovementForm" (ngSubmit)="OnSaveForms()">

            <div class="content">
                <div class="card">

                    <div class="card-header text-center mt-5">
                        <h1 class="text-3xl">{{data.title}}</h1>
                    </div>

                    <!-- <div class="grid grid-cols-12 gap-5 mt-5"> -->
                        <input type="number" formControlName="id" hidden>
                        <input type="number" formControlName="companyId" hidden>

                        <div class="grid grid-cols-12 gap-5 mt-5">
                             <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                                <label for="vehicleId" class="control-label font-weight-bold">{{"MechanismNumber"|translate}}<span
                                        class="required-asterisk">*</span></label>
                                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                    [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                    optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                                    autoWidth="false" [virtualScroll]="false" formControlName="vehicleId"
                                    [options]="MechanismList" [disabled]="disableAll"
                                    [ngClass]="{ 'invalid-field': VehicleLicensingMovementForm.get('vehicleId').value <= 0}">
                                </p-dropdown>
                            </div>

                            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                                <label for="licenseExpDate" class="control-label font-weight-bold">{{"LicenseExpirationDate"|translate}}<span
                                        class="required-asterisk">*</span></label>
                                <input type="date" class="input border w-full mt-1" formControlName="licenseExpDate" [attr.disabled]="disableAll ? 'disabled' : null">
                            </div>
                        </div>
                       
                        <div class="grid grid-cols-12 gap-5 mt-5">
                              <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                                <label for="insuranceId" class="control-label font-weight-bold">{{"Insurance"|translate}}<span
                                        class="required-asterisk">*</span></label>
                                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                    [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                    optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                                    autoWidth="false" [virtualScroll]="false" formControlName="insuranceId"
                                    [options]="InsuranceList" [disabled]="disableAll"
                                    [ngClass]="{ 'invalid-field': VehicleLicensingMovementForm.get('insuranceId').value <= 0}">
                                </p-dropdown>
                            </div>

                            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                                <label for="insuranceExpDate" class="control-label font-weight-bold">{{"expireDateForInsuranceCard"|translate}}<span
                                        class="required-asterisk">*</span></label>
                                <input type="date" class="input border w-full mt-1" formControlName="insuranceExpDate" [attr.disabled]="disableAll ? 'disabled' : null">
                            </div>

                             <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                                <label for="insuranceType" class="control-label font-weight-bold">{{"InsuranceType"|translate}}</label>
                                <input type="text" class="input border w-full mt-1" formControlName="insuranceType" [attr.disabled]="disableAll ? 'disabled' : null">
                            </div>
                        </div>

                    <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions>
                        <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" type="submit" *ngIf="!disableAll"
                            [disabled]="VehicleLicensingMovementForm.invalid"
                            styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component">
                        </p-button>

                        <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                            (click)="dialogRef.close(false)"
                            styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"></p-button>
                    </div>


                </div>
            </div>
        </form>
    </div>
</div>
