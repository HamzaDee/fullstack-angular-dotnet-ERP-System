<br>
<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">

        <form [formGroup]="CheckUpsAddForm" (ngSubmit)="OnSaveForms()">
            <input type="text" formControlName="id" class="form-control " hidden>
            <input type="text" formControlName="companyId" class="form-control " hidden>

            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="vehicleDriver" class="control-label font-weight-bold">{{"transNo"|translate}}</label>
                    <input id="vehicleDriver" type="text" formControlName="id" class="input border w-full mt-1 " [readOnly]="true">                    
               </div>
                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                    <label for="vehicleId" class="control-label font-weight-bold">{{"MechanismNo"|translate}} <span class="required-asterisk">*</span> </label>
                    <p-dropdown id="vehicleId" emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="vehiclesList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="vehicleId" filterBy="text"
                        appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="disableAll"
                        [ngClass]="{ 'invalid-field': CheckUpsAddForm.get('vehicleId').value <= 0}"
                        (onChange)="getVehicleDetails($event.value)">
                    </p-dropdown>                        
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                     <label for="vehicleType" class="control-label font-weight-bold">{{"MechanismType"|translate}}</label>
                     <input id="vehicleType" type="text" [(ngModel)]="vehicleType" class="input border w-full mt-1 "  
                     [ngModelOptions]="{standalone: true}" [readOnly]="true">                    
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="vehicleDriver" class="control-label font-weight-bold">{{"ExpensesOn"|translate}}</label>
                    <input id="vehicleDriver" type="text" [(ngModel)]="vehicleDriver" class="input border w-full mt-1 "  
                    [ngModelOptions]="{standalone: true}" [readOnly]="true">                    
               </div>
               <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                    <label for="checkDate" class="control-label font-weight-bold">{{"Date"|translate}}<span class="required-asterisk">*</span></label>
                    <input id="checkDate" type="date" formControlName="checkDate"  class="input border w-full mt-1 " [attr.disabled]=" disableAll ? 'disabled' : null">
               </div>                                                            
            </div>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label for="maintOfficer" class="control-label font-weight-bold">{{"MaintenanceResbonsible"|translate}}</label>
                    <p-dropdown id="maintOfficer" emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="employeesList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="maintOfficer" filterBy="text"
                        appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="disableAll">
                    </p-dropdown>                        
                </div>
                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label for="headDepartmentId" class="control-label font-weight-bold">{{"MovementChife"|translate}}</label>
                    <p-dropdown id="headDepartmentId" emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="employeesList"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="headDepartmentId" filterBy="text"
                        appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="disableAll">
                    </p-dropdown>                        
                </div>
                <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label for="weeklyMaintenance" class="control-label font-weight-bold">{{"MaintenanceworkDuringtheweek"|translate}}<span class="required-asterisk">*</span></label>
                    <input id="weeklyMaintenance" type="text" formControlName="weeklyMaintenance" class="input border w-full mt-1 "[attr.disabled]="disableAll ? 'disabled' : null"
                    [ngClass]="{ 'invalid-field': isEmpty(CheckUpsAddForm.get('weeklyMaintenance').value)}">                    
               </div>
            </div>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label for="notes" class="control-label font-weight-bold">{{"GeneralNotes"|translate}}</label>
                    <input id="notes" type="text" formControlName="notes" class="input border w-full mt-1 "
                    [attr.disabled]="disableAll ? 'disabled' : null">                    
                </div>
                <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                    <label for="gmNotes" class="control-label font-weight-bold">{{"AdministrativeDirectorNotes"|translate}}</label>
                    <input id="gmNotes" type="text" formControlName="gmNotes" class="input border w-full mt-1 "
                    [attr.disabled]="disableAll ? 'disabled' : null">                    
                </div>
            </div>
            <div class="card" class="card-blue">
                <div class="intro-y box px-5 pt-5 mt-5">
                    <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">
                        <a width="200px" data-toggle="tab" data-target="#f01" href="javascript:;"
                            class="py-4 sm:mr-8 active">{{"Details"|translate}}</a>
                    </div>
                </div>

                 <div class="intro-y tab-content">
                    <div class="tab-content__pane active" id="f01">
                        <div class="intro-y box px-5 pt-5">
                            <p-table #dt [value]="checkupsList"  dataKey="id" [loading]="loading"
                                styleClass="p-datatable-gridlines" [rowHover]="true" scrollHeight="400px">
                                <ng-template pTemplate="caption">
                                    <div class="grid grid-cols-12 gap-5 ">
                                        <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mb-5">
                                            <p-button label='{{"AddLine"|translate}}' 
                                                styleClass="p-ripple p-element button w-32 mr-2 mb-5 items-center justify-center bg-theme-1 text-white p-button p-component"
                                                icon="pi pi-plus" (click)="AddNewLine()" [disabled]="disableAll"></p-button>
                                        </div>
                                    </div>
                                </ng-template>
                                <ng-template pTemplate="header">
                                    <tr>
                                        <th class="head_tb" style="width: 10%" >{{"Inspectandcleanthemechanismfromtheinsideandoutside"|translate}}</th>
                                        <th class="head_tb" style="width: 10%" >{{"EngienCheck"|translate}}</th>
                                        <th class="head_tb" style="width: 10%" >{{"OileCheck"|translate}}</th>
                                        <th style="width: 2%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="body" class=".p-datatable-tbody " let-activity let-i="rowIndex">
                                    <tr>   
                                        <td style="text-align: justify;" *ngIf="isdisabled">
                                            <input type="number" [(ngModel)]="activity.id" 
                                            [ngModelOptions]="{standalone: true}" class="input border w-full mt-1">
                                        </td> 
                                        <td *ngIf="isdisabled">
                                            <input type="number" [(ngModel)]="activity.hdId" 
                                            [ngModelOptions]="{standalone: true}" class="input border w-full mt-1">
                                        </td>                                                                                          
                                        <td>
                                            <input type="Text"
                                            [(ngModel)]="activity.vehicleClean" [disabled]="disableAll"
                                            [ngModelOptions]="{standalone: true}" class="input border w-full mt-1" >
                                        </td>                                     
                                        <td>
                                            <input type="Text"
                                            [(ngModel)]="activity.engineCheck" [disabled]="disableAll"
                                            [ngModelOptions]="{standalone: true}" class="input border w-full mt-1" >
                                        </td>
                                        <td>
                                            <input type="Text"
                                            [(ngModel)]="activity.oilCheck" [disabled]="disableAll"
                                            [ngModelOptions]="{standalone: true}" class="input border w-full mt-1" >
                                        </td>                                                                                                                    
                                        <td style="width: 2% !important;">
                                            <button mat-menu-item (click)="deleteRow(i)"[disabled]="disableAll"> <i
                                                class="material-icons" style="color:red">delete</i>                                                
                                            </button>
                                        </td>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="emptymessage">
                                    <tr class="odd">
                                        <td style="vertical-align: top;" colspan="9"> {{"noEntriesFoundLabel"|translate}}</td>
                                    </tr>
                                </ng-template>                        
                            </p-table>
                        </div>
                    </div>            
                </div> 
            </div>

            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1 flex justify-end" mat-dialog-actions>
                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="CheckUpsAddForm.invalid  || disableSave" type="submit"[hidden]="showsave"></p-button>
                <!-- <p-button label='{{"Print"|translate}}' icon="pi pi-print" class="ml-4"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="CheckUpsAddForm.invalid" type="button" (onClick)="PrintPurchaseRequest(this.CheckUpsAddForm.value.id)"></p-button> -->
                <p-button label='{{"Delete"|translate}}' color="warn" icon="pi pi-trash" class="ml-4"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    [disabled]="CheckUpsAddForm.invalid" type="button"[hidden]="showsave" (onClick)="DeleteVoucher(this.CheckUpsAddForm.value.id)"></p-button>
                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 items-center justify-center bg-theme-6 text-white p-button p-component"
                    [routerLink]="['/CheckUp/Checkuplist']"></p-button>
            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
