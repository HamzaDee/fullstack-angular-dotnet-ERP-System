<div class="intro-y box px-5 pb-5 mb-5">
    <div class="grid grid-cols-12 gap-3 pt-2 items-center">
        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
            <label class="control-label font-weight-bold">{{ "FromDate" | translate }}</label>
            <input type="date" class="input border w-full mt-1" [(ngModel)]="fromDate">
        </div>
    
        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
            <label class="control-label font-weight-bold">{{ "ToDate" | translate }}</label>
            <input type="date" class="input border w-full mt-1" [(ngModel)]="toDate">
        </div>
    
        <div class="col-span-12 sm:col-span-8 xxl:col-span-8 flex items-center mt-10">
            <p-button label='{{ "ShowTransactions" | translate }}' (onClick)="GetSearch()"
                      styleClass="p-ripple p-element button w-34 mr-2 mb-5 bg-theme-1 text-white p-button p-component">
            </p-button>
            &nbsp;
            <p-button label='{{ "NewSearch" | translate }}' (onClick)="clearFormData()"
                      styleClass="p-ripple p-element button w-32 mb-5 bg-theme-1 text-white p-button p-component">
            </p-button>
        </div>
    </div>

    <br>

<div class="container">
    <p-table #dt [value]="tabelData" [rows]="10" [paginator]="true" 
        [globalFilterFields]="['order_no','venName','odate']"  paginatorDropdownAppendTo="body"
        styleClass="p-datatable-gridlines" responsiveLayout="scroll" [rowHover]="true" dataKey="id"
        currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
        [showCurrentPageReport]="true" [rowsPerPageOptions]="[10,25,50]">
        <ng-template pTemplate="caption">
            <div class="grid grid-cols-12 gap-5 ">
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1 mr-1">
                    <span class="p-input-icon-left">
                        <i class="pi pi-search"></i>
                        <input class="pInputText input border w-full mt-1" pInputText type="text"
                            (input)="dt.filterGlobal($event.target.value, 'contains')"
                            placeholder=' {{"search"|translate}} ' />
                    </span>
                </div>
                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-3" >
                    <p-button label='{{"AddNew"|translate}}' icon="pi pi-plus" class="mr-4"
                    styleClass="p-ripple p-element button w-32 mr-2 items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="bottom" (click)="AddNew(0)"></p-button>
                </div>
                <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mt-5" align="end">
                    <button title="{{'ExportToExcel' | translate}}" class="mr-2" type="button" pbutton=""
                    pripple="" icon="pi pi-file-excel" ptooltip="XLS" (click)="exportExcel()"
                    tooltipposition="bottom" class="button px-2 mr-1 mb-2 text-gray-700">
                    <img src="../../../../assets/dist/images/icons/excel.svg" width="20px">
                    </button>
                    <button title="{{'ExportToPdf' | translate}}" class="mr-2" type="button" pbutton=""
                            pripple="" icon="pi pi-file-excel" ptooltip="PDF" (click)="exportPdf()"
                            tooltipposition="bottom" class="button px-2 mr-1 mb-2 text-gray-700">
                            <img src="../../../../assets/dist/images/icons/pdf.svg" width="20px">
                    </button>
                </div>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 10%" pSortableColumn="order_no">{{"OrderNo"|translate}} <p-sortIcon field="order_no"></p-sortIcon></th>
                <th style="width: 10%" pSortableColumn="odate">{{"OrderDate"|translate}} <p-sortIcon field="odate"></p-sortIcon> </th>
                <th style="width: 50%" pSortableColumn="venName">{{"Supplier"|translate}} <p-sortIcon field="venName"></p-sortIcon></th>                
                <th style="width: 10%" pSortableColumn="arrivalDate">{{"ArrivalDate"|translate}} <p-sortIcon field="arrivalDate"></p-sortIcon></th>
                <th style="width: 15%">{{"OrderStatus"|translate}}</th>
                <th style="width: 5%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" class=".p-datatable-tbody " let-purOrders>
            <tr>
                <td>{{purOrders.order_no}}</td>
                <td>{{purOrders.odate|date:'yyyy/MM/dd'}}</td>
                <td>{{purOrders.venName}}</td>
                <td>{{purOrders.arrivalDate|date:'yyyy/MM/dd'}}</td>
                <td><p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [options]="purOrderStatusList" styleClass="input border mt-1"
                        [style]="{'minWidth':'80%', 'width': '80%'}"
                        optionLabel="text" optionValue="id" [filter]="true" filterBy="text"
                        appendTo="body"  autoWidth="false"  [(ngModel)]="purOrders.status"  
                        [ngClass]="{ 'invalid-field': purOrders.status <= 0}"
                        [ngModelOptions]="{standalone: true}">
                    </p-dropdown>
                    <button (click)="SaveStatus(purOrders.trans_no,purOrders.status)" title='{{"SaveOrderStatus"|translate}}'> <i
                        class="material-icons" style="color:green">save</i>
                </button>
                </td>
                <td style="width:5%">
                    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="">
                        <mat-icon class="">more_vert</mat-icon>
                    </button>
                    <mat-menu #userMenu="matMenu">
                        <button mat-menu-item (click)="ShowPurOrder(purOrders.trans_no)"> 
                            <i class="material-icons" style="color:blue">visibility</i> &nbsp;{{"showDetails"|translate}} </button>
                        <button mat-menu-item (click)="EditPurOrder(purOrders.trans_no,false)" >
                            <i class="material-icons" style="color:green">edit</i> &nbsp;{{"Edit"|translate}} </button>
                        <button mat-menu-item (click)="DeletePurOrder(purOrders.trans_no)" > 
                            <i class="material-icons" style="color:red">delete</i> &nbsp;{{"Delete"|translate}} </button>
                        <button mat-menu-item (click)="PrintPurchaseOrder(purOrders.trans_no)"> 
                            <i class="material-icons" style="color:rgba(0, 119, 255, 0.836)">print</i> &nbsp;{{"PrintAction"|translate}} </button>
                        <button mat-menu-item (click)="CopyPurOrder(purOrders.trans_no)"> 
                            <i class="material-icons" style="color:rgba(0, 255, 242, 0.507)">file_copy</i> &nbsp;{{"VoucherCopy"|translate}} </button>
                       <button mat-menu-item (click)="PurchaseOrderttachment(purOrders.trans_no)"> 
                            <i class="material-icons" style="color:black">attachment</i> &nbsp;{{"Attachments"|translate}}
                        </button> 
                    </mat-menu>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr class="odd">
                <td valign="top" colspan="8"> {{"noEntriesFoundLabel"|translate}}</td>
            </tr>
        </ng-template>
    </p-table>
</div>

</div>
