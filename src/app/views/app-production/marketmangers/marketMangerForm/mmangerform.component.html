<form [formGroup]="MarketMangerForm" (ngSubmit)="OnSaveForms()">
    
    <div class="content">
        <div class="card">
            <div class="card-header text-center">
                <h4>{{data.title}}</h4>
            </div>
            <input type="number" class="form-control" formControlName="id" hidden>
            <div class="card-body">
         <!-- <div class="row">   -->
            <div class="intro-y box p-5 mt-12 sm:mt-5">
                <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1" >
                        <label >{{"Email"|translate}} <span class="required-asterisk">*</span></label>
                        <input type="text" style="display:none;" autocomplete="username">
                        <input  
                        type="email" class="input border w-full mt-1" formControlName="email" autocomplete="off" 
                        (blur)="CheckIfExistEmail(this.MarketMangerForm.value.id,this.MarketMangerForm.value.email)"
                        [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('email').value)}" />

                            <div *ngIf="MarketMangerForm.get('email')?.hasError('required') && MarketMangerForm.get('email')?.touched" class="text-red-500 mt-1">
                                Email is required.
                            </div>                            
                            <div *ngIf="MarketMangerForm.get('email')?.hasError('email') && MarketMangerForm.get('email')?.touched" class="text-red-500 mt-1">
                                Please enter a valid email address.
                            </div>
                    </div>  
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"ArabicName"|translate}} <span class="required-asterisk">*</span></label>
                        <input type="text" class="input border w-full mt-1" formControlName="nameA"
                        [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('nameA').value)}"
                        [attr.disabled]=" disableAll ? 'disabled' : null">
                    </div>
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"EnglishName"|translate}} <span class="required-asterisk">*</span></label>
                        <input type="text" class="input border w-full mt-1" formControlName="nameE"
                        [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('nameE').value)}"
                        [attr.disabled]=" disableAll ? 'disabled' : null">
                    </div>                                     
                </div>  
                <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"Market"|translate}} <span
                                class="required-asterisk">*</span></label>
                        <p-multiSelect emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text"
                            styleClass="input border w-full mt-1" optionValue="id" formControlName="marketId"
                            [options]="marketsList" [filter]="true" filterBy="text" appendTo="body" autoWidth="false"
                            [virtualScroll]="false"
                            (onChange)="onCountryChange($event.value)"
                            [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('marketId').value)}">
                        </p-multiSelect>
                    </div>
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"Agent"|translate}} <span
                                class="required-asterisk">*</span></label>
                        <p-multiSelect emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text"
                            styleClass="input border w-full mt-1" optionValue="id" formControlName="agentId"
                            [options]="filteredAgentsList" [filter]="true" filterBy="text" appendTo="body" autoWidth="false"
                            [virtualScroll]="false"  (onChange)="SelectAllAgents($event)"
                            [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('agentId').value)}">
                        </p-multiSelect>
                    </div>                    
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"PhoneNumber"|translate}}</label>
                        <input type="text" class="input border w-full mt-1" formControlName="mobile">
                    </div>
                </div> 
                <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"Password"|translate}} <span class="required-asterisk">*</span></label>

                            <p-password formControlName="password" class="input border w-full mt-1"  style="text-align: left !important;"
                                [toggleMask]="true"
                                promptLabel="Choose a password"
                                weakLabel="Too simple" 
                                mediumLabel="Average complexity" 
                                strongLabel="Complex password"
                                [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('password').value)}">
                            </p-password>

                    </div>
                    <!-- <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"Password"|translate}} <span class="required-asterisk">*</span></label>
                        <input type="text" class="input border w-full mt-1" formControlName="password"
                        [ngClass]="{ 'invalid-field': isEmpty(MarketMangerForm.get('password').value)}">
                    </div> -->
                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-8">
                        <input id="Active" [checked]="active==1" (change)="active=(active==0)?1:0" type="checkbox"
                                class="input border mr-2 mr-3 ml-3" [disabled]="this.disable" />
                         <label class="cursor-pointer select-none"
                                for="Active">{{"SendUserAndPassByEmail"|translate}}</label>
                    </div>
                </div>
                    <div class="grid grid-cols-12 gap-5 mt-5">
                        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                            <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"  [disabled]="MarketMangerForm.invalid || disableSave ||disableAll"
                                styleClass="p-ripple p-element button w-32 mr-2 mb-2  flex items-center justify-center bg-theme-1 text-white p-button p-component"
                                type="submit"></p-button>
                            <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component" (click)="dialogRef.close(false)"></p-button>
                        </div>
                    </div>
                </div>                
            </div>
        </div>
    </div>
    <!-- </div> -->
</form>
