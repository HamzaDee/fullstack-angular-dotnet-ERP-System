<div class="intro-y box px-5 pb-5 mb-5">

    <div class="grid grid-cols-12 gap-3 pt-2">

        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
            <div>
                <label class="control-label font-weight-bold">{{"FromDate"|translate}} </label>
                <input id="fromDate" type="date" class="input border w-full mt-1" [(ngModel)]="fromDate">
            </div>
        </div>

        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
            <div>
                <label class="control-label font-weight-bold">{{"ToDate"|translate}}</label>
                <input id="toDate" type="date" class="input border w-full mt-1" [(ngModel)]="toDate">
            </div>
        </div>

        <br>

        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 ">
            <p-button label='{{"ShowReport"|translate}}' class="ml-4" (click)="GetReport()"
                styleClass="p-ripple p-element button w-32 mr-2 mb-5 flex items-center justify-center bg-theme-1 text-white p-button p-component">
            </p-button>
            &nbsp;
            <p-button label='{{"NewSearch"|translate}}'
                styleClass="p-ripple p-element button w-32 mr-2 mb-5 flex items-center justify-center bg-theme-1 text-white p-button p-component">
            </p-button>
        </div>
    </div>

    <br>

    <div class="col-span-12 sm:col-span-12 xxl:col-span-12 ">
        <p-table #dt [value]="Data" [rows]="20" [paginator]="true" [globalFilterFields]="['itemNo','itemName']"
            styleClass="p-datatable-gridlines" [rowHover]="true" dataKey="id"
            currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
            [showCurrentPageReport]="true">
            <ng-template pTemplate="caption">
                <div class="grid grid-cols-12 gap-5 ">
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1 mb-5">
                        <span class="p-input-icon-left">
                            <i class="pi pi-search"></i>
                            <input class="pInputText input border w-full mt-1" pInputText type="text"
                                (input)="dt.filterGlobal($event.target.value, 'contains')"
                                placeholder=' {{"search"|translate}} ' />
                        </span>
                    </div>
                    <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mt-5" align="end">
                        <i class="pi pi-star-fill"
                            [ngClass]="{'custom-star-icon': custom, 'custom-star-icon2': !custom}"
                            (click)="updateFavourite(this.screenId)" title="{{'AddToFavourite' | translate}}"
                            tooltipposition="bottom">
                        </i>
                        <button title="{{'ExportToExcel' | translate}}" class="mr-2" type="button" pbutton="" pripple=""
                            icon="pi pi-file-excel" ptooltip="XLS" (click)="exportExcel()" tooltipposition="bottom"
                            class="button px-2 mr-1 mb-2 text-gray-700">
                            <img src="../../../../assets/dist/images/icons/excel.svg" width="20px">
                        </button>
                        <button title="{{'ExportToPdf' | translate}}" class="mr-2" type="button" pbutton="" pripple=""
                            icon="pi pi-file-excel" ptooltip="PDF" (click)="exportPdf()" tooltipposition="bottom"
                            class="button px-2 mr-1 mb-2 text-gray-700">
                            <img src="../../../../assets/dist/images/icons/pdf.svg" width="20px">
                        </button>
                    </div>
                </div>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="itemNo">{{"ProductNumber"|translate}}</th>
                    <th pSortableColumn="itemName">{{"ProductName"|translate}} </th>
                    <th pSortableColumn="countryQty">{{"ManufacturedQuantities"|translate}}</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" class=".p-datatable-tbody " let-item>
                <tr>
                    <td>{{item.itemNo}}</td>
                    <td>{{item.itemName}}</td>
                    <td>{{item.countryQty | number: '1.3-3'}}</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr class="odd">
                    <td valign="top" colspan="3"> {{"noEntriesFoundLabel"|translate}}</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="footer">
                <tr>
                    <td></td>
                    <td>{{"total"|translate}}</td>
                    <td>{{calculateSum() | number: '1.3-3'}}</td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
<div class="intro-y box tab-content">
    <div class="col-md-12" id="htmlData">
        <div class="grid grid-cols-12 gap-5 mt-5">
            <div class="mt-1 col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer">
                <div class="card mb-0 col-md-12">
                    <div class="card-body">
                        <div style="width: 100%;"></div>
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
