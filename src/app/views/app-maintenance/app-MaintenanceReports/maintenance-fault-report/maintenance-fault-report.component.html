<div class="intro-y box px-5 pb-5 mb-5">
  <form [formGroup]="MaintenanceFaultReport">

    <div class="grid grid-cols-12 gap-3 pt-2">

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
        <label class="font-weight-bold">{{"FromDate"|translate}}</label>
        <input type="date" formControlName="fromdate" class="input border w-full mt-1">
      </div>

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
        <label class="font-weight-bold">{{"ToDate"|translate}}</label>
        <input type="date" formControlName="todate" class="input border w-full mt-1">
      </div>

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
        <label class="font-weight-bold">{{"Damage"|translate}}</label>
        <p-dropdown
          [options]="faultList"
          optionLabel="text"
          optionValue="id"
          [filter]="true"
          appendTo="body"
          styleClass="input border w-full mt-1"
          formControlName="damageId">
        </p-dropdown>
      </div>

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
        <label class="font-weight-bold">{{"MaintenanceType"|translate}}</label>
        <p-dropdown
          [options]="maintenanceTypelist"
          optionLabel="text"
          optionValue="id"
          [filter]="true"
          appendTo="body"
          styleClass="input border w-full mt-1"
          formControlName="inRequest">
        </p-dropdown>
      </div>

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-1">
        <label class="font-weight-bold">{{"Branch"|translate}}</label>
        <p-dropdown
          [options]="branchList"
          optionLabel="text"
          optionValue="id"
          [filter]="true"
          appendTo="body"
          styleClass="input border w-full mt-1"
          formControlName="branchId">
        </p-dropdown>
      </div>

      <div class="col-span-12 sm:col-span-4 xxl:col-span-4 mt-4">
        <input type="checkbox" formControlName="groupByBranch">
        <label>{{"GroupByBranch"|translate}}</label>
      </div>

    </div>

    <div class="grid grid-cols-12 gap-5 mr-2 mt-3">

      <div class="col-span-12 sm:col-span-2">
        <p-button
          label='{{"ShowRecord"|translate}}'
          styleClass="button w-32 bg-theme-1 text-white"
          (click)="search()">
        </p-button>
      </div>

      <div class="col-span-12 sm:col-span-2">
        <p-button
          label='{{"NewSearch"|translate}}'
          styleClass="button w-32 bg-theme-1 text-white"
          (click)="clearFormData()">
        </p-button>
      </div>

    </div>

    <div class="grid grid-cols-12 gap-2 pt-4">
      <div class="col-span-12">

        <p-table
          [value]="data"
          [loading]="showLoader"
          styleClass="p-datatable-gridlines"
          responsiveLayout="scroll"
        >

          <ng-template pTemplate="header">
            <tr>
              <th>{{"Branch"|translate}}</th>
              <th>{{"Damage"|translate}}</th>
              <th>{{"Repetition"|translate}}</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-item>
            <tr>
              <td>{{item.branchNameA || item.branchNameE}}</td>
              <td>{{item.damageName}}</td>
              <td>{{item.repetition}}</td>
            </tr>
          </ng-template>

          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="3">{{"noEntriesFoundLabel"|translate}}</td>
            </tr>
          </ng-template>

        </p-table>

      </div>
    </div>

  </form>
</div>
