<form [formGroup]="FixedassetsTypeForm" (ngSubmit)="OnSaveForms()">
    <div class="content">
        <div class="card">

            <div class="card-header text-center mt-5">
                <h1 class="text-3xl">{{data.title}}</h1> 
              </div>


            <div class="intro-y box p-5 mt-12 sm:mt-5">
                <div class="grid grid-cols-12 gap-5 mt-5">


                   <input hidden formControlName="id" [(ngModel)]="Data.id"> 

                   <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"MainType"|translate}}</label>
                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                        [style]="{'minWidth':'100%', 'width': '100%'}" (onChange)="GetMainTypeInfo()"
                        styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selectedMainTypeName"
                        appendTo="body" autoWidth="false" [virtualScroll]="false"  formControlName="mainTypeId" [options]="MainTypeNameList">
                    </p-dropdown>
                </div>

                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"ArabicName"|translate}}<span class="required-asterisk">*</span></label>
                        <input type="text" class="input border w-full mt-1 " formControlName="typeNameA" [(ngModel)]="Data.typeNameA">
                    </div>


                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"EnglishName"|translate}}<span class="required-asterisk">*</span></label>
                        <input type="text"  class="input border w-full mt-1 " formControlName="typeNameE"  [(ngModel)]="Data.typeNameE">
                    </div>


                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"CalculationMethod"|translate}} <span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text"  [(ngModel)]="selectedPaymentMethod"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="depreciationMethod" [options]="PaymentMethodList">
                        </p-dropdown>
                    </div>


                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"DepreciationRatio"|translate}}<span class="required-asterisk">*</span></label>
                        <input type="text"  class="input border w-full mt-1 " formControlName="depreciationPercentage" [(ngModel)]="Data.depreciationPercentage">
                    </div>


                    <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-6">
                        <label class="cursor-pointer select-none w-full" >{{"TypePrincipal"|translate}}</label>
                        <input  type="checkbox" class="input border mr-2 mr-3 ml-3" formControlName="isMain" [(ngModel)]="Data.isMain" />
                    </div>


                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"OriginalAccount"|translate}} <span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selectedassetAccId"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="assetAccId" [options]="AccountsModelList">
                        </p-dropdown>
                    </div>


                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"ConsumptionCalculation"|translate}} <span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selecteddepreriationAccId"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="depreriationAccId"  [options]="AccountsModelList">
                        </p-dropdown>
                    </div>
                 

                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"AccumulatedDepreciationAccount"|translate}} <span class="required-asterisk">*</span></label>

                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selectedaccumulatedDeprAccId"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="accumulatedDeprAccId"  [options]="AccountsModelList">
                        </p-dropdown>
                    </div>


                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"MaintenanceAccount"|translate}} <span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selectedexpensesAccId"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="expensesAccId"  [options]="AccountsModelList">
                        </p-dropdown>
                    </div>



                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"CapitalGainsAndLossesAccount"|translate}} <span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                            [style]="{'minWidth':'100%', 'width': '100%'}" 
                            styleClass="input border w-full mt-1"optionLabel="text" optionValue="id"[filter]="true" filterBy="text" [(ngModel)]="selectedprofitLossAccId"
                            appendTo="body" autoWidth="false" [virtualScroll]="false" formControlName="profitLossAccId"  [options]="AccountsModelList">
                        </p-dropdown>
                    </div>


                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"Notes"|translate}}</label>
                        <input type="text"  class="input border w-full mt-1 " formControlName="note" [(ngModel)]="Data.note">
                    </div>


                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1"></div>

                </div>
            </div>

            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"    [disabled]="FixedassetsTypeForm.invalid || disableSave"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="submit"></p-button>

                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo" (click)="dialogRef.close(false)"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"></p-button>
            </div>


        </div>
    </div>
</form>
