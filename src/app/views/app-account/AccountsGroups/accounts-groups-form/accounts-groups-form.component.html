<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">
        <br>
        <form [formGroup]="AccountsGroupsForm" (ngSubmit)="OnSaveForms()">
            <input type="text" formControlName="id" class="form-control" hidden>
            <input type="text" formControlName="companyId" class="form-control" hidden>

            <div class="grid grid-cols-12 gap-5 mt-5">


                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"GroupsNumber"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <input type="number" class="input border w-full mt-1" formControlName="groupNo"
                        [ngClass]="{ 'invalid-field': AccountsGroupsForm.get('groupNo').value <= 0}"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>

                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"GroupsNameArabic"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <input type="text" class="input border w-full mt-1" formControlName="groupNameA"
                         [ngClass]="{ 'invalid-field': isEmpty(AccountsGroupsForm.get('groupNameA').value)}"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>

                <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"GroupsNameEnglish"|translate}}<span
                            class="required-asterisk">*</span></label>
                    <input type="text" class="input border w-full mt-1" formControlName="groupNameE"
                        [ngClass]="{ 'invalid-field': isEmpty(AccountsGroupsForm.get('groupNameE').value)}"
                        [attr.disabled]="disableAll ? 'disabled' : null">
                </div>




                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
                    <div class="intro-y tab-content">

                        <div class="intro-y box px-5 pt-5 mt-5">
                            <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">
                                <a width="200px" data-toggle="tab" data-target="#f01" href="javascript:;"
                                    class="py-4 sm:mr-8 active">
                                </a>
                            </div>
                        </div>

                        <div class="intro-y box tab-content">
                            <div class="tab-content__pane active" id="f01">
                                <div class="intro-y box px-5 pt-5 pb-5">
                                    <p-table #dt [value]="AccInGroupsModelList" dataKey="id" [loading]="loading" [scrollable]="true"
                                        [paginator]="false" [style]="{width:'100%'}" [responsive]="true"
                                        [resizableColumns]="true" styleClass="p-datatable-gridlines" [rowHover]="true"
                                        scrollDirection="horizontal">

                                        <ng-template pTemplate="caption">
                                            <div class="grid grid-cols-12 gap-5 ">
                                                <div
                                                    class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mb-5">
                                                    <p-button label='{{"AddLine"|translate}}'
                                                        styleClass="p-ripple p-element button w-32 mr-2 mb-5 items-center justify-center bg-theme-1 text-white p-button p-component"
                                                        icon="pi pi-plus" (click)="AddNewLine()" [disabled]="disableAll"></p-button>
                                                </div>
                                            </div>
                                        </ng-template>

                                        <ng-template pTemplate="header">
                                            <tr>
                                                <th style="width: 95%" pSortableColumn="accountId"> {{"ACCOUNT"|translate}}</th>
                                                <th style="width: 5%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                                            </tr>
                                        </ng-template>

                                        <ng-template pTemplate="body" class=".p-datatable-tbody" let-row let-i="rowIndex">
                                            <tr>
                                                <td style="width: 95%">
                                                    <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                                        [optionLabel]="'text'"  optionValue="id" [filter]="true" 
                                                        filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="disableAll"
                                                        [ngModelOptions]="{standalone: true}" [options]="AccountList" [(ngModel)]="row.accountId"
                                                        [style]="{'minWidth':'100%', 'width': '100%'}" [ngClass]="{ 'invalid-field':row.accountId <= 0}">
                                                    </p-dropdown> 
                                                </td>

                                                <td style="width: 5%"> 
                                                    <button mat-menu-item (click)="deleteRow(i)"
                                                        [disabled]="disableAll"> <i class="material-icons" style="color:red">delete</i>
                                                    </button>
                                                </td>

                                                <td>
                                                </td>
                                            </tr>
                                        </ng-template>

                                        <ng-template pTemplate="emptymessage">
                                            <tr class="odd">
                                                <td valign="top" colspan="10">
                                                    {{"noEntriesFoundLabel"|translate}}</td>
                                            </tr>
                                        </ng-template>

                                    </p-table>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            </div>

            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">

                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" type="submit"
                    [disabled]="AccountsGroupsForm.invalid || disableSave" [hidden]="showsave"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component">
                </p-button>

                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    [routerLink]="['/AccountsGroup/AccountsGroupsList']"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-6 text-white p-button p-component">
                </p-button>

            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
