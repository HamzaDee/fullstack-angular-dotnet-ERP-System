<form [formGroup]="PostingServiceAddForm" (ngSubmit)="OnSaveForms()">
    <div class="content">
        <div class="card">
            <input type="number" class="form-control" formControlName="id" hidden>
            <div class="card-body">
                <div class="intro-y box p-5 mt-12 sm:mt-5">
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold ml-3">{{"Post"|translate}}: </label>
                            <input type="radio" [value]="1" id="Checkbox1" name="post" class="input border w-full mt-1"
                                [(ngModel)]="isPost" [checked]="isPost == 1" formControlName="post">
                        </div>
                        <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold ml-3">{{"UnPost"|translate}}:</label>
                            <input type="radio" [value]="2" id="Checkbox1" name="post" class="input border w-full mt-1"
                                [(ngModel)]="isPost" [checked]="isPost == 2" formControlName="post">
                        </div>

                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"VoucherType"|translate}}</label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                [options]="voucherstypeList" [(ngModel)]="selectedtype"
                                [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                optionLabel="text" optionValue="id" [filter]="true" formControlName="voucherTypeId"
                                filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false">
                            </p-dropdown>
                        </div>
                        <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"FromVoucher"|translate}}</label>
                            <input type="text" formControlName="voucherNoFrom" class="input border w-full mt-1 ">
                        </div>

                        <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"ToVoucher"|translate}}</label>
                            <input type="text" formControlName="voucherNoTo" class="input border w-full mt-1 ">
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"FromDate"|translate}}</label>
                            <input type="date" formControlName="fromDate" class="input border w-full mt-1 ">
                        </div>

                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"ToDate"|translate}}</label>
                            <input type="date" formControlName="toDate" class="input border w-full mt-1 ">
                        </div>
                        <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"Branch"|translate}}</label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                [options]="userbranchList" [(ngModel)]="selectedbranch"
                                [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                                optionLabel="text" optionValue="id" [filter]="true" formControlName="branchId"
                                filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false">
                            </p-dropdown>
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label class="control-label font-weight-bold">{{"Note"|translate}}</label>
                            <input type="text" formControlName="note" class="input border w-full mt-1 ">
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5 pt-5">
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <input type="text" class="input border w-full mt-1 " [hidden]="true">
                        </div>
                    </div>
                    <div class="grid grid-cols-12 gap-5 mr-2">
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mb-5 mr-2">
                            <p-button label='{{"ShowRecord"|translate}}'
                                styleClass="p-ripple p-element button w-32 mr-2 mb-5 items-center justify-center bg-theme-1 text-white p-button p-component"
                                icon="" (click)="GetVouchers()"></p-button>
                        </div>
                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mb-5 mr-2">
                            <p-button label='{{"NewSearch"|translate}}'
                                styleClass="p-ripple p-element button w-32 mr-2 mb-5 items-center justify-center bg-theme-1 text-white p-button p-component"
                                icon="" (click)="clearFormData()"></p-button>
                        </div>
                    </div>
                </div>
                <div class="intro-y box px-5 pt-5">
                    <div class="col-md-12" id="htmlData">

                        <p-table #dt [value]="voucherData" [rows]="16" [paginator]="true" [globalFilterFields]="['',]"
                            styleClass="p-datatable-gridlines" responsiveLayout="scroll" [rowHover]="true" dataKey="id"
                            currentPageReportTemplate="{{'showing'|translate}} {first} {{'to'|translate}}  {last} {{'of'|translate}} {totalRecords} {{'entries'|translate}}"
                            [showCurrentPageReport]="true">
                            <ng-template pTemplate="caption"></ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th><label><input type="checkbox" (change)="toggleAllCheckboxes($event)"> {{
                                            "Choose" | translate }} </label></th>
                                    <th class="head_tb" style="width: 33% !important;">
                                        {{"VoucherType"|translate}} </th>
                                    <th class="head_tb" style="width: 20% !important;">{{"VoucherNo"|translate}}
                                    </th>
                                    <th class="head_tb" style="width: 20% !important;">
                                        {{"VoucherDate"|translate}} </th>
                                    <th class="head_tb" style="width: 20% !important;">{{"Note"|translate}}
                                    </th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" class=".p-datatable-tbody" let-row let-i="rowIndex">
                                <tr>
                                    <td style="text-align: justify;"><input type="checkbox" [(ngModel)]="row.isChecked"
                                            [ngModelOptions]="{standalone: true}"
                                            (ngModelChange)="updateIsAnyRowChecked()"></td>
                                    <td style="text-align: justify;">{{ row.voucherName }}</td>
                                    <td style="text-align: justify;">{{ row.voucherNo }}</td>
                                    <td style="text-align: justify;">{{ row.voucherDate | date:'yyyy-MM-dd' }}
                                    </td>
                                    <td style="text-align: justify;">{{ row.note }}</td>
                                    <td style="text-align: justify;" [hidden]="true"><input type="checkbox"
                                            [(ngModel)]="row.id" [ngModelOptions]="{standalone: true}"></td>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                    <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions
                        align="end">
                        <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                            styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                            [disabled]="!isAnyRowChecked || PostingServiceAddForm.invalid" type="submit">
                        </p-button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>
