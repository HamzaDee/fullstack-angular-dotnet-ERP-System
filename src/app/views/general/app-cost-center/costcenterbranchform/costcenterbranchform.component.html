<br>
<div class="intro-y box px-5 pb-5 mb-5">
    <div [hidden]="showLoader">

        <form [formGroup]="CostcenterAddForm" (ngSubmit)="OnSaveForms()">
            <input type="text" class="form-control" formControlName="id" hidden>

            <div class="grid grid-cols-12 gap-5 pt-5">

                <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                    <label class="control-label font-weight-bold">{{"ParentAccount"|translate}} :
                    </label>
                    <label [innerText]="CostcenterAddForm.get('noAndName').value"></label>
                </div>

            </div>
            <div class="grid grid-cols-12 gap-5 pt-5">
                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
                    <p-table #dt [value]="CostCenterModelList" dataKey="id" [loading]="loading"
                        [globalFilterFields]="['',]" styleClass="p-datatable-gridlines" [rowHover]="true">
                        <ng-template pTemplate="caption">
                            <div class="grid grid-cols-12 gap-5 ">
                                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1 mb-5 ">
                                    <span class="p-input-icon-left">
                                        <i class="pi pi-search"></i>
                                        <input class="pInputText input border w-full mt-1 " pInputText type="text"
                                            (input)="dt.filterGlobal($event.target.value, 'contains')"
                                            placeholder=' {{"search"|translate}} ' />
                                    </span>
                                </div>
                                <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-4">
                                    <p-button label='{{"AddNew"|translate}}'
                                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                                        icon="pi pi-plus" (click)="AddNewLine()"></p-button>
                                </div>
                            </div>
                        </ng-template>
                        <ng-template pTemplate="header">
                            <tr>
                                <th style="width: 10%" pSortableColumn="accNo">{{"CostCenterNo"|translate}}</th>
                                <th style="width: 10%" pSortableColumn="name">{{"ArabicName"|translate}} </th>
                                <th style="width: 10%" pSortableColumn="parentAccName">{{"EnglishName"|translate}} </th>
                                <th style="width: 5%" pSortableColumn="isMain">{{"Active"|translate}} </th>
                                <th style="width: 5%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" class=".p-datatable-tbody " let-accountList let-rowIndex="rowIndex">
                            <tr>

                                <td><input type="number" [(ngModel)]="accountList.itemNo"
                                        class="input border w-full mt-1 " (blur)="CheckIfChooseSameAccNo($event, rowIndex)"
                                        [ngModelOptions]="{standalone: true}" [disabled]="accountList.id>0">
                                </td>

                                <td><input type="text" [(ngModel)]="accountList.descrA"
                                        class="input border w-full mt-1 "
                                        [ngModelOptions]="{standalone: true}">
                                </td>

                                <td><input type="text" [(ngModel)]="accountList.descrE"
                                        class="input border w-full mt-1 "
                                        [ngModelOptions]="{standalone: true}">
                                </td>

                                <td><input [checked]="accountList.status" type="checkbox"
                                        (change)="onCheckboxChange($event, accountList)"
                                        class="input border mr-2 mr-3 ml-3" />
                                </td>

                                <td style="width: 2%">
                                    <button mat-menu-item
                                        (click)="$event.stopPropagation(); $event.preventDefault(); deleteRow(accountList.itemNo)"
                                        [hidden]="accountList.id > 0">
                                        <i class="material-icons" style="color:red">delete</i>
                                    </button>
                                </td>


                            </tr>
                        </ng-template>
                        <ng-template pTemplate="emptymessage">
                            <tr class="odd">
                                <td valign="top" colspan="9"> {{"noEntriesFoundLabel"|translate}}</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
            <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4"
                    [disabled]="CostcenterAddForm.invalid"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-1 text-white p-button p-component"
                    type="submit"></p-button>

                <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                    [routerLink]="['/CostCenter/CostCenterTree']"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-2  items-center justify-center bg-theme-6 text-white p-button p-component"></p-button>
            </div>
        </form>
    </div>
</div>

<div class="loading-indicator" [hidden]="!showLoader">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
