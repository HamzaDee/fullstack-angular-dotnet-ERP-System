<div class="intro-y box px-5 pb-5 mb-5">

    <form [formGroup]="CurrencyRateForm" (ngSubmit)="OnSaveForms()">

        <input type="text" class="form-control " formControlName="id" hidden>
        <div class="grid grid-cols-12 gap-5 mt-5">

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                <label class="control-label font-weight-bold">{{"Currency"|translate}}<span
                        class="required-asterisk">*</span></label>
                <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                    [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                    optionLabel="text" optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                    autoWidth="false" [virtualScroll]="false" formControlName="currencyId" [options]="CurrencyList"
                    (onChange)="getCurrencyRate($event)"
                    [ngClass]="{ 'invalid-field': CurrencyRateForm.get('currencyId').value <= 0}">
                </p-dropdown>
            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                <label class="control-label font-weight-bold">{{"ExchangeRate"|translate}}<span
                        class="required-asterisk">*</span></label>
                <input type="number" class="input border w-full mt-1 " formControlName="rate"
                    [ngClass]="{ 'invalid-field': CurrencyRateForm.get('rate').value <= 0}">
            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                <label class="control-label font-weight-bold">{{"VoucherDate"|translate}}<span
                        class="required-asterisk">*</span></label>
                <input type="date" class="input border w-full mt-1 " formControlName="rateDate">
            </div>

            <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-6">
                <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" type="submit"
                    [disabled]="CurrencyRateForm.invalid"
                    styleClass="p-ripple p-element button w-32 mr-2 mb-1 flex items-center justify-center bg-theme-1 text-white p-button p-component">
                </p-button>
            </div>

        </div>

    </form>

    <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1">
        <div class="intro-y box tab-content">
            <div class="intro-y box px-5 pt-5 pb-5">

                <p-table #dt [value]="data" [rows]="10" [paginator]="true"
                    [globalFilterFields]="['id', 'currencyName', 'rate', 'rateDate']" styleClass="p-datatable-gridlines"
                    responsiveLayout="scroll" [rowHover]="true" dataKey="id"
                    currentPageReportTemplate="{{ 'showing' | translate }} {first} {{ 'to' | translate }} {last} {{ 'of' | translate }} {totalRecords} {{ 'entries' | translate }}"
                    [showCurrentPageReport]="true">

                    <ng-template pTemplate="caption">
                        <div class="grid grid-cols-12 gap-5">
                            <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-1 mb-5">
                                <span class="p-input-icon-left">
                                    <i class="pi pi-search"></i>
                                    <input class="pInputText input border w-full mt-1" pInputText type="text"
                                        (input)="dt.filterGlobal($event.target.value, 'contains')"
                                        placeholder="{{ 'search' | translate }}" />
                                </span>
                            </div>

                            <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mt-5" align="end">
                                <i class="pi pi-star-fill"
                                    [ngClass]="{'custom-star-icon': custom, 'custom-star-icon2': !custom}"
                                    (click)="updateFavourite(this.screenId)" title="{{ 'AddToFavourite' | translate }}"
                                    tooltipposition="bottom"></i>

                                <button title="{{ 'ExportToExcel' | translate }}"
                                    class="mr-4 button px-2 mr-1 mb-2 text-gray-700" type="button" pbutton="" pripple=""
                                    icon="pi pi-file-excel" ptooltip="XLS" (click)="exportExcel()"
                                    tooltipposition="bottom">
                                    <img src="../../../../assets/dist/images/icons/excel.svg" width="20px">
                                </button>

                                <button title="{{ 'ExportToPdf' | translate }}"
                                    class="mr-4s button px-2 mr-1 mb-2 text-gray-700" type="button" pbutton=""
                                    pripple="" icon="pi pi-file-pdf" ptooltip="PDF" (click)="exportPdf()"
                                    tooltipposition="bottom">
                                    <img src="../../../../assets/dist/images/icons/pdf.svg" width="20px">
                                </button>
                            </div>
                        </div>
                    </ng-template>

                    <ng-template pTemplate="header">
                        <tr>
<!--                             <th class="head_tb" pSortableColumn="id">{{"transNo"|translate}}</th>
 -->                            <th class="head_tb" pSortableColumn="currencyName">{{"Currency"|translate}}</th>
                            <th class="head_tb" pSortableColumn="rate">{{"ExchangeRate"|translate}}</th>
                            <th class="head_tb" pSortableColumn="rateDate">{{"transDate"|translate}}</th>
                            <th style="flex: 0 0 5%"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" class=".p-datatable-tbody" let-row>
                        <tr>
<!--                             <td style="text-align: justify;">{{ row.id }}</td>
 -->                            <td style="text-align: justify;">{{ row.currencyName }}</td>
                            <td style="text-align: justify;">{{ row.rate }}</td>
                            <td style="text-align: justify;">{{ row.rateDate | date: 'dd/MM/yyyy' }}</td>

                            <td style="width:5%">
                                <button mat-icon-button [matMenuTriggerFor]="userMenu" class="">
                                    <mat-icon class="">more_vert</mat-icon>
                                </button>
                                <mat-menu #userMenu="matMenu">

                                    <button mat-menu-item (click)="EditCurrencyrate(row.id,false)"><!-- تعديل -->
                                        <i class="material-icons" style="color:blue">edit</i> &nbsp;{{"Edit"|translate}}
                                    </button>

                                    <button mat-menu-item (click)="DeleteCurrencyrate(row.id, row)"> <!--  حذف -->
                                        <i class="material-icons" style="color:red">delete</i>
                                        &nbsp;{{"Delete"|translate}}
                                    </button>

                                </mat-menu>
                            </td>

                        </tr>
                    </ng-template>



                    <ng-template pTemplate="emptymessage">
                        <tr class="odd">
                            <td valign="top" colspan="10">
                                {{"noEntriesFoundLabel"|translate}}</td>
                        </tr>
                    </ng-template>

                </p-table>
            </div>
        </div>
    </div>



</div>
