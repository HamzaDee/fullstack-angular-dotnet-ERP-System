<form [formGroup]="CopyPermissionsForm" >
    <div class="content">
        <div class="card"> 
            <div class="card-header text-center mt-5">
                <h1>{{data.title}}</h1>
            </div>
            <div class="intro-y box p-5 mt-12 sm:mt-5">
                <div class="grid grid-cols-12 gap-5 mt-5">                
                    <!-- Groups Table -->
                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 mt-1">
                        <label class="control-label font-weight-bold">{{"Groups"|translate}}</label>
                        <p-table [value]="groupsList" [paginator]="true" [rows]="10" [responsive]="true"
                        [globalFilterFields]="['','','']">
                            <ng-template pTemplate="header">
                                <tr>
                                    <th pSortableColumn="voucherName"> {{"choose"|translate}}</th>
                                    <th pSortableColumn="group.text"> {{"Group"|translate}}</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-group>
                                <tr>
                                  <td>
                                    <input type="checkbox"[value]="group.id"[checked]="isGroupSelected(group.id)"(change)="onGroupSelect($event)"/>
                                  </td>
                                  <td>{{group.text}}</td>
                                </tr>
                              </ng-template>
                        </p-table>
                    </div>

                    <!-- Users Table -->
                    <div class="col-span-12 sm:col-span-6 xxl:col-span-6 mt-1">
                        <label class="control-label font-weight-bold">{{"Users"|translate}}</label>
                        <p-table [value]="usersList" [paginator]="true" [rows]="10" [responsive]="true">
                            <ng-template pTemplate="header">
                                <tr>
                                    
                                    <th> {{"choose"|translate}}</th>
                                    <th> {{"user"|translate}}</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-user>
                                <tr>
                                  <td>
                                    <input type="checkbox" [value]="user.id" [checked]="isUserSelected(user.id)" (change)="onUserSelect($event)"/>
                                  </td>
                                  <td>{{user.text}}</td>
                                </tr>
                              </ng-template>
                        </p-table>
                    </div>
                </div>

                <div class="col-span-12 sm:col-span-12 xxl:col-span-12 mt-1" mat-dialog-actions align="end">
                    <p-button label='{{"CopyPermissions"|translate}}' icon="pi pi-save" class="ml-4"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                        type="submit" (onClick)="OnSaveForms()">
                    </p-button>
                    <p-button  label='{{"Cancel"|translate}}'  color="warn"  icon="pi pi-undo"
                        styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component"
                        (click)="dialogRef.close()">
                    </p-button>
                </div>
            </div>
        </div>
    </div>
</form>
