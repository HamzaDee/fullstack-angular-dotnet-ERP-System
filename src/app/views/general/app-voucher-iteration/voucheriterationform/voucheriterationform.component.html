<form [formGroup]="voucheriterationForm" (ngSubmit)="OnSaveForms()">
    <div class="content">
        <div class="card">
            <div class="card-header text-center mt-5">
                <h1>{{data.title}}</h1>
            </div>
            <div>
                <input type="number" formControlName="id" class="input border w-full mt-1 " hidden="true">  
                <input type="number" formControlName="voucherHDId" class="input border w-full mt-1 " hidden="true"> 
            </div>
            <div class="intro-y box p-5 mt-12 sm:mt-5">

           

                <div class="grid grid-cols-12 gap-5 mt-5">
                     <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                        <label for="voucherTypeId" class="control-label font-weight-bold">{{"VoucherType"|translate}}<span class="required-asterisk">*</span></label>
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="voucherTypeList"
                            [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                            optionLabel="value" optionValue="label" [filter]="true" formControlName="voucherTypeId"
                            filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false"
                            [ngClass]="{ 'invalid-field': voucheriterationForm.get('voucherTypeId').value <= 0}">
                        </p-dropdown>
                    </div>       
                    <!-- <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"VoucherType"|translate}}
                            <span class="required-asterisk">*</span>
                        </label>
                        <input type="text" formControlName="voucherName" class="input border w-full mt-1 " readonly [attr.disabled]="disableAll ? 'disabled' : null">
                    </div> -->
    
                    <div class="col-span-12 sm:col-span-3 xxl:col-span-3 cursor-pointer mt-1">
                        <label class="control-label font-weight-bold">{{"VoucherNo"|translate}}
                            <span class="required-asterisk">*</span>
                        </label>
                        <input type="text" formControlName="voucherNo" class="input border w-full mt-1 " readonly [attr.disabled]="disableAll ? 'disabled' : null">
                    </div>

                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"StartDate"|translate}}<span class="required-asterisk">*</span></label>
                        <input type="date" formControlName="startDate" class="input border w-full mt-1 " [attr.disabled]="disableAll ? 'disabled' : null">
                    </div>
                </div>
                <div class="grid grid-cols-12 gap-5 mt-5">

                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <input type="radio" [value]="1" id="Checkbox1" name="dateis" class="input border w-full mt-1" formControlName="dateis" 
                        [(ngModel)]="isdate" [checked]="isdate == 1" [attr.disabled]="isdate ? true : null" (ngModelChange)="isdateChange()" [attr.disabled]="disableAll ? 'disabled' : null">
                        
                        &nbsp;
                        <label class="control-label font-weight-bold ml-3">{{"EndDate"|translate}} <span
                            class="required-asterisk">*</span></label>
                  
                    </div>  

                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <input type="radio" [value]="1" id="Checkbox2" name="numberis" class="input border w-full mt-1" formControlName="numberis" 
                        [(ngModel)]="isnumber" [checked]="isnumber == 1" min="1" [attr.disabled]="isnumber ? true : null" (ngModelChange)="isnumberChange()" [attr.disabled]="disableAll ? 'disabled' : null">

                        &nbsp;
                        <label class="control-label font-weight-bold ml-3">{{"Repeats"|translate}} <span
                            class="required-asterisk">*</span></label>
                       
                    </div>
                </div>
                    
                
                <div class="grid grid-cols-12 gap-5 mt-5">                                       
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">                        
                        <input type="date" formControlName="endDate" class="input border w-full mt-1 " [attr.disabled]="disabledDate || disableAll ? 'disabled' : null">
                    </div>                    
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">                        
                        <input type="number" formControlName="iterationNo" class="input border w-full mt-1 " [attr.disabled]="disablediterationNo ||disableAll ? 'disabled' : null">
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-1">
                        <label >{{"IterationName"|translate}}<span class="required-asterisk">*</span></label>
                        <input type="number" formControlName="every" class="input border w-full mt-1 " min="1" [attr.disabled]="disableAll ? 'disabled' : null"
                        [ngClass]="{ 'invalid-field': voucheriterationForm.get('every').value <= 0}">
                    </div> 

                    <div class="col-span-12 sm:col-span-4 xxl:col-span-4 cursor-pointer mt-4">
                        <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}' [options]="repeatList"
                        [(ngModel)]="selectedrep"
                        [style]="{'minWidth':'100%', 'width': '100%'}" styleClass="input border w-full mt-1"
                        optionLabel="text" optionValue="id" [filter]="true" formControlName="iterationType"
                        filterBy="text" appendTo="body" autoWidth="false" [virtualScroll]="false" [disabled]="disableAll"
                        [ngClass]="{ 'invalid-field': voucheriterationForm.get('iterationType').value <= 0}">
                        </p-dropdown>
                    </div>
                </div>      
                
                 <div class="card" class="card-blue">
                    <div class="intro-y box px-5 pt-5 mt-5">
                        <div class="nav-tabs flex flex-col sm:flex-row justify-center lg:justify-start">
                            <a width="200px" data-toggle="tab" data-target="#f01" href="javascript:;"
                                class="py-4 sm:mr-8 active">{{"VoucherDetails"|translate}}</a>                       
                        </div>
                    </div>

                     <div class="intro-y tab-content">
                        <div class="tab-content__pane active" id="f01">
                        <div class="intro-y box px-5 pt-5">
                            <p-table #dt [value]="voucherIterationDTList" dataKey="id" [loading]="loading"
                                styleClass="p-datatable-gridlines" [rowHover]="true">
                                <ng-template pTemplate="caption">
                                    <div class="grid grid-cols-12 gap-5 ">
                                        <div class="col-span-12 sm:col-span-8 xxl:col-span-8 cursor-pointer mb-5">
                                            <p-button label='{{"AddLine"|translate}}' 
                                                styleClass="p-ripple p-element button w-32 mr-2 mb-5 items-center justify-center bg-theme-1 text-white p-button p-component"
                                                icon="pi pi-plus" (click)="AddNewLine()"></p-button>                                            
                                        </div>
                                        
                                         
                                    </div>
                                </ng-template>
                                <ng-template pTemplate="header">
                                    <tr>
                                        <th class="head_tb"  style="width: 20%" pSortableColumn="accountId">{{"AccountNo"|translate}}</th>
                                        <th class="head_tb" style="width: 10%" pSortableColumn="debit">{{"Debit"|translate}}</th>
                                        <th class="head_tb" style="width: 10%" pSortableColumn="credit">{{"Credit"|translate}}</th>
                                        <th class="head_tb" style="width: 20%" pSortableColumn="note">{{"Notes"|translate}}</th> 
                                         <th class="text-center-m w-0" style="width: 100px"><i class="pi pi-cog" style="font-size: 1.2rem"></i></th>                                                                           
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="body" class=".p-datatable-tbody " let-accountList let-i="rowIndex">
                                    <tr>
                                        <td><p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                            [options]="accountsList" [style]="{'minWidth':'100%', 'width': '100%'}"
                                            styleClass="custom-dropdown-scroll input border w-full mt-1" optionLabel="text"
                                            optionValue="id" [filter]="true" filterBy="text" appendTo="body"
                                            autoWidth="false" [disabled]="disableAll"
                                            [(ngModel)]="accountList.accountId" [ngClass]="{ 'invalid-field': accountList.accountId <= 0}"
                                            [ngModelOptions]="{standalone: true}"  [virtualScroll]="false" >
                                        </p-dropdown></td>                                    
                                        <td><input type="number" [(ngModel)]="accountList.debit" (ngModelChange)="onDebitChange(accountList)"
                                                class="input border w-full mt-1 " [ngClass]="{ 'invalid-field': isOneEmpty(accountList) }"
                                                [ngModelOptions]="{standalone: true}" (blur)="formatAmt(accountList,0)" [disabled]="disableAll">
                                        </td>
                                        <td><input type="number" [(ngModel)]="accountList.credit" [ngClass]="{ 'invalid-field': isOneEmpty(accountList) }"
                                                class="input border w-full mt-1 " (ngModelChange)="onCreditChange(accountList)"
                                                [ngModelOptions]="{standalone: true}" (blur)="formatAmt(accountList,1)" [disabled]="disableAll">
                                        </td>
                                        <td><input type="text" [(ngModel)]="accountList.note" 
                                                class="input border w-full mt-1 " 
                                                [ngModelOptions]="{standalone: true}" [disabled]="disableAll">
                                        </td>
                                        <td style="width: 2% !important;">
                                            <button mat-menu-item (click)="deleteRow(i)" [disabled]="disableAll"> <i
                                                class="material-icons" style="color:red">delete</i>                                                
                                            </button>
                                        </td> 

                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="emptymessage">
                                    <tr class="odd">
                                        <td valign="top" colspan="9"> {{"noEntriesFoundLabel"|translate}}</td>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="footer" >
                                    <tr>
                                        <td>{{"total"|translate}}</td>
                                        <td>{{calculateSum(1)}}</td>
                                        <td>{{calculateSum(2)}}</td>
                                        <td colspan="4"></td>
                                    </tr>
                                    <tr style="color: red">
                                        <td>{{"Difference"|translate}}</td>
                                        <td>{{calculateSum(0)}}</td>
                                        <td></td>
                                        <td colspan="4"></td>
                                    </tr>
                                </ng-template>
                            </p-table>
                        </div>
                    </div>
                     </div>
                 </div>















                <div class="grid grid-cols-12 gap-5 mt-5">
                        <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                            <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                            [hidden]="this.data.ishidden"  type="submit" [disabled]="voucheriterationForm.invalid"></p-button>

                            <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                                styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component" (click)="dialogRef.close(false)"></p-button>
                        </div>
                </div>
            </div>
        </div>
    </div>
    
</form>
