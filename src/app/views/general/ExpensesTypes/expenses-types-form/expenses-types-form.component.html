<form [formGroup]="ExpensesTypesForm" (ngSubmit)="OnSaveForms()">
    <div class="content">
        <div class="card">
            <div class="card-header text-center mt-5">
                <h1>{{data.title}}</h1>
            </div>
            <div class="intro-y box p-5 mt-12 sm:mt-5">
                <div class="grid grid-cols-12 gap-5 mt-5">
                   
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label >{{"ArabicName"|translate}}<span class="required-asterisk">*</span></label>
                            <input type="text" class="input border w-full mt-1" formControlName="expensesNameA">
                        </div>

                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label >{{"EnglishName"|translate}}<span class="required-asterisk">*</span></label>
                            <input type="text" class="input border w-full mt-1" formControlName="expensesNameE">
                        </div>
                   
                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label >{{"DebitAccount"|translate}}</label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id"
                                 styleClass="input border w-full mt-1" [filter]="true" filterBy="text" appendTo="body"
                                autoWidth="false" [virtualScroll]="false" formControlName="debitAccountId" [options]="AccountsList"  [(ngModel)]="selectedDebitAccount">
                            </p-dropdown>
                        </div>

                        <div class="col-span-12 sm:col-span-6 xxl:col-span-6 cursor-pointer mt-1">
                            <label >{{"CreditAccount"|translate}}</label>
                            <p-dropdown emptyFilterMessage='{{"noEntriesFoundLabel"|translate}}'
                                [style]="{'minWidth':'100%', 'width': '100%'}" optionLabel="text" optionValue="id"
                                 styleClass="input border w-full mt-1" [filter]="true" filterBy="text" appendTo="body"
                                autoWidth="false" [virtualScroll]="false" formControlName="creditAccountId" [options]="AccountsList"  [(ngModel)]="selectedCreditAccount">
                            </p-dropdown>
                        </div>

                       
                  
                        <div class="col-span-12 sm:col-span-10 xxl:col-span-10 cursor-pointer mt-1">
                            <label >{{"notes"|translate}}</label>
                            <input type="text" class="input border w-full mt-1" formControlName="note">
                        </div>

                        <div class="col-span-12 sm:col-span-2 xxl:col-span-2 cursor-pointer mt-6">
                            <input id="check_Active" type="checkbox" class="input border mr-2 mr-3 ml-3" [checked]="active==1" (change)="active=(active==0)?1:0" />
                            <label class="cursor-pointer select-none" for="check_Active">{{"Active"|translate}} </label>
                        </div>

                    </div>
                    <div class="grid grid-cols-12 gap-5 mt-5">
                    <div class="col-span-12 sm:col-span-12 xxl:col-span-12 cursor-pointer mt-1" mat-dialog-actions align="end">
                        <p-button label='{{"Save"|translate}}' icon="pi pi-save" class="ml-4" styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-1 text-white p-button p-component"
                          [disabled]="ExpensesTypesForm.invalid"  type="submit">
                        </p-button>

                        <p-button label='{{"Cancel"|translate}}' color="warn" icon="pi pi-undo"
                            styleClass="p-ripple p-element button w-32 mr-2 mb-2 flex items-center justify-center bg-theme-6 text-white p-button p-component" (click)="dialogRef.close(false)">
                        </p-button>
                    </div>
                </div>
                </div>
            </div>
        </div>
   
</form>
